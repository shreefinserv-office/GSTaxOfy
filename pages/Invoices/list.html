<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GStaxOfy — All Invoices</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="manifest" href="../../manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="GStaxOfy">
    <link rel="apple-touch-icon" href="../../assets/icon-192.png">
</head>
<body>
<div class="app-container">
    <header class="header">
        <div class="logo-section">
            <div class="ca-logo"><img src="../../assets/logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="ca-logo-text" style="display:none">CA</span></div>
            <div class="company-info"><h1 id="firmNameHeader">GStaxOfy</h1><p>GSTaxOfy</p></div>
        </div>
        <div class="user-info" onclick="toggleUserDropdown()">
            <div class="user-avatar" id="headerAvatar">G</div>
            <div class="user-details"><div class="user-name" id="headerUserName">Loading…</div><div class="user-role" id="headerUserRole"></div></div>
            <i class="fas fa-chevron-down" style="color:#6b7280;font-size:12px;margin-left:4px"></i>
            <div class="user-dropdown" id="userDropdown">
                <div class="user-dropdown-item" onclick="window.location.href=ROUTES.changePassword()"><i class="fas fa-key"></i> Change Password</div>
                <div class="user-dropdown-item danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</div>
            </div>
        </div>
    </header>
    <div class="main-content">
        <aside class="sidebar" id="sidebar-placeholder"></aside>
        <main class="content-area">
            <div class="section-header">
                <div class="page-title" style="margin:0"><i class="fas fa-list"></i> All Invoices</div>
                <button class="btn btn-primary" onclick="window.location.href=ROUTES.generateInvoice()"><i class="fas fa-plus"></i> New Invoice</button>
            </div>

            <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px">
                <input type="text" id="searchInput" placeholder="Search invoice no. or client…" oninput="filterInvoices()"
                    style="padding:7px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;min-width:200px">
                <select id="filterStatus" onchange="filterInvoices()" style="padding:7px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;background:#fff">
                    <option value="">All Status</option>
                    <option value="unpaid">Unpaid</option>
                    <option value="paid">Paid</option>
                    <option value="cancelled">Cancelled</option>
                </select>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>#</th><th>Invoice No.</th><th>Date</th><th>Client</th><th>Amount</th><th>Status</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="invBody">
                        <tr><td colspan="7" style="text-align:center;padding:30px;color:#9ca3af"><i class="fas fa-spinner fa-spin"></i> Loading…</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</div>

<!-- Status update modal -->
<div class="modal-overlay" id="statusModal">
    <div class="modal-box" style="max-width:360px">
        <div class="modal-header">
            <span class="modal-title"><i class="fas fa-edit" style="color:#2563eb;margin-right:8px"></i>Update Status</span>
            <button class="modal-close" onclick="closeModal('statusModal')">&times;</button>
        </div>
        <input type="hidden" id="sm_id">
        <div class="form-group" style="margin-bottom:16px">
            <label>Status</label>
            <select id="sm_status" style="padding:10px 14px;border:1.5px solid #d1d5db;border-radius:8px;font-size:14px;width:100%;background:#fff">
                <option value="unpaid">Unpaid</option>
                <option value="paid">Paid</option>
                <option value="cancelled">Cancelled</option>
            </select>
        </div>
        <div class="form-actions">
            <button class="btn btn-secondary" onclick="closeModal('statusModal')">Cancel</button>
            <button class="btn btn-primary" onclick="updateStatus()"><i class="fas fa-save"></i> Save</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="logoutModal">
    <div class="modal-box" style="max-width:340px">
        <div class="modal-header"><span class="modal-title">Confirm Logout</span><button class="modal-close" onclick="closeModal('logoutModal')">&times;</button></div>
        <p style="color:#6b7280;margin-bottom:20px;text-align:center">Are you sure you want to logout?</p>
        <div style="display:flex;gap:10px;justify-content:center">
            <button class="btn btn-secondary" onclick="closeModal('logoutModal')">Cancel</button>
            <button class="btn btn-danger" onclick="confirmLogout()">Yes, Logout</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../js/supabase-config.js"></script>
<script src="../../js/app.js"></script>
<script src="../../js/sidebar.js"></script>
<script src="../../js/layout.js"></script>
<script>
let allInvoices = [];

(async () => {
    const profile = await initLayout();
    if (!profile) return;
    renderSidebar('invoices');
    setActiveNav();
    const { data: firm } = await _supabase.from('firm_details').select('firm_name').single();
    if (firm) document.getElementById('firmNameHeader').textContent = firm.firm_name;
    await loadInvoices();
})();

async function loadInvoices() {
    const { data, error } = await _supabase
        .from('invoices')
        .select('*, clients(name)')
        .order('invoice_date', { ascending: false });
    if (error) { showToast('Failed to load invoices.', 'error'); return; }
    allInvoices = data || [];
    filterInvoices();
}

function filterInvoices() {
    const q  = document.getElementById('searchInput').value.toLowerCase();
    const st = document.getElementById('filterStatus').value;
    const filtered = allInvoices.filter(inv => {
        if (st && inv.status !== st) return false;
        if (q && !(inv.invoice_no||'').toLowerCase().includes(q) && !(inv.clients?.name||'').toLowerCase().includes(q)) return false;
        return true;
    });
    renderTable(filtered);
}

function renderTable(invoices) {
    const body = document.getElementById('invBody');
    if (!invoices.length) {
        body.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:30px;color:#9ca3af">No invoices found.</td></tr>';
        return;
    }
    const statusColors = { unpaid:'badge-red', paid:'badge-green', cancelled:'badge-gray' };
    body.innerHTML = invoices.map((inv, i) => `<tr>
        <td>${i+1}</td>
        <td><code style="background:#f3f4f6;padding:2px 6px;border-radius:4px;font-size:12px">${inv.invoice_no||'—'}</code></td>
        <td style="font-size:12px">${fmtDate(inv.invoice_date)}</td>
        <td><strong>${inv.clients?.name||'—'}</strong></td>
        <td><strong style="color:#2563eb">₹ ${parseFloat(inv.total_amount||0).toFixed(2)}</strong></td>
        <td><span class="badge ${statusColors[inv.status]||'badge-gray'}">${(inv.status||'').charAt(0).toUpperCase()+(inv.status||'').slice(1)}</span></td>
        <td style="white-space:nowrap">
            <button class="btn btn-secondary btn-sm" onclick="openStatusModal(${inv.id},'${inv.status}')" title="Update Status"><i class="fas fa-edit"></i></button>
        </td>
    </tr>`).join('');
}

function openStatusModal(id, status) {
    document.getElementById('sm_id').value = id;
    document.getElementById('sm_status').value = status;
    openModal('statusModal');
}

async function updateStatus() {
    const id     = parseInt(document.getElementById('sm_id').value);
    const status = document.getElementById('sm_status').value;
    const { error } = await _supabase.from('invoices').update({ status, updated_at: new Date().toISOString() }).eq('id', id);
    if (error) { showToast(error.message, 'error'); return; }
    showToast('Status updated.', 'success');
    closeModal('statusModal');
    await loadInvoices();
}
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('../../sw.js').then(()=>console.log('[PWA] SW registered')).catch(e=>console.warn('[PWA] SW failed:',e));}</script>
</body>
</html>
