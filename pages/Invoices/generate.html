<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GStaxOfy — Generate Invoice</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="manifest" href="../../manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-title" content="GStaxOfy">
    <link rel="apple-touch-icon" href="../../assets/icon-192.png">
    <style>
        .task-pick-item { display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all .15s }
        .task-pick-item:hover { border-color:#2563eb;background:#eff6ff }

<script>
// ── AES-256-GCM Client Field Decryption ──────────────────────
const CLIENT_ENC_KEY_MATERIAL = 'GSTaxOfy-AES256-ClientData-Secret-v1';
let _aesKey = null;
async function getAESKey() {
    if (_aesKey) return _aesKey;
    const enc = new TextEncoder();
    const km  = await crypto.subtle.importKey('raw', enc.encode(CLIENT_ENC_KEY_MATERIAL), { name:'PBKDF2' }, false, ['deriveKey']);
    _aesKey   = await crypto.subtle.deriveKey(
        { name:'PBKDF2', salt:enc.encode('GSTaxOfy-Salt-v1'), iterations:100000, hash:'SHA-256' },
        km, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
    );
    return _aesKey;
}
async function aesDecrypt(ct) {
    if (!ct || !String(ct).includes(':')) return ct || '';
    try {
        const key = await getAESKey();
        const [ivB64, ctB64] = String(ct).split(':');
        const b = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
        const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b(ivB64) }, key, b(ctB64));
        return new TextDecoder().decode(pt);
    } catch { return ct; }
}
async function decClientRow(row) {
    if (!row) return row;
    const fields = ['address','contact_no','email_id','gst_no','pan_no','aadhar_no','assessee_type'];
    const out = { ...row };
    for (const f of fields) { if (out[f]) out[f] = await aesDecrypt(out[f]); }
    return out;
}

// Logo as base64 — loaded once, reused for preview + PDF
let _logoB64 = null;
async function getLogoBase64() {
    if (_logoB64) return _logoB64;
    try {
        const res = await fetch('../../assets/shree.png');
        const blob = await res.blob();
        return new Promise(resolve => {
            const r = new FileReader();
            r.onload = () => { _logoB64 = r.result; resolve(_logoB64); };
            r.readAsDataURL(blob);
        });
    } catch { return null; }
}

let allClients = [];
let firmData   = {};
let clientTasks = [];
let lineItemCount = 0;
let editId = null, editingInvoice = null, preCheckedTaskIds = [];
let lastSavedInvoiceHtml = null, lastSavedInvoiceNo = null;

(async () => {
    const profile = await initLayout();
    if (!profile) return;
    renderSidebar('generate-invoice');
    setActiveNav();

    const params = new URLSearchParams(window.location.search);
    editId = parseInt(params.get('id')) || null;

    // Set today as default date
    document.getElementById('inv_date').value = new Date().toISOString().split('T')[0];

    // Load firm data + clients in parallel
    const [{ data: firm }, { data: clients }] = await Promise.all([
        _supabase.from('firm_details').select('*').single(),
        _supabase.from('clients').select('id, name, address, contact_no, email_id, gst_no').eq('is_active', true).order('name')
    ]);

    if (firm) {
        firmData = firm;
        document.getElementById('firmNameHeader').textContent = firm.firm_name;
    }
    allClients = await Promise.all((clients || []).map(decClientRow));

    const sel = document.getElementById('inv_client');
    allClients.forEach(c => sel.innerHTML += `<option value="${c.id}">${c.name}</option>`);

    if (editId) {
        await loadInvoiceForEdit(editId);
    } else {
        // Auto-generate invoice number
        const { count } = await _supabase.from('invoices').select('id', { count: 'exact', head: true });
        const now = new Date();
        const fy  = now.getMonth() >= 3 ? now.getFullYear() : now.getFullYear() - 1;
        const fyStr = String(fy).slice(2) + String(fy+1).slice(2);
        document.getElementById('inv_no').value = `IN${fyStr}/${String((count||0)+1).padStart(3,'0')}`;

        addLineItem(); // start with 1 empty row
    }
})();

async function loadInvoiceForEdit(id) {
    const { data: inv, error } = await _supabase
        .from('invoices')
        .select('*, invoice_tasks(task_id)')
        .eq('id', id)
        .single();
    if (error || !inv) { showToast('Invoice not found.', 'error'); return; }
    editingInvoice = inv;
    preCheckedTaskIds = (inv.invoice_tasks || []).map(it => it.task_id);

    // Switch page into edit mode visually
    document.getElementById('pageTitle').innerHTML = '<i class="fas fa-file-invoice"></i> Edit Invoice';
    document.getElementById('saveBtnLabel').textContent = 'Update Invoice';

    document.getElementById('inv_no').value   = inv.invoice_no || '';
    document.getElementById('inv_date').value = inv.invoice_date || '';
    document.getElementById('inv_client').value = inv.client_id || '';
    document.getElementById('inv_notes').value  = inv.notes || '';

    // Populate line items from saved invoice
    const items = (() => { try { return JSON.parse(inv.line_items || '[]'); } catch { return []; } })();
    document.getElementById('lineItemsContainer').innerHTML = '';
    lineItemCount = 0;
    if (items.length) {
        items.forEach(li => addLineItem(li.description, li.sac, li.amount));
    } else {
        addLineItem();
    }

    // Load this client's task picker (will exclude tasks already invoiced elsewhere,
    // but keep this invoice's own linked tasks visible & pre-checked)
    if (inv.client_id) await onInvClientChange();

    refreshPreview();
}

async function onInvClientChange() {
    const cid = parseInt(document.getElementById('inv_client').value);
    if (!cid) { document.getElementById('taskPickerSection').style.display='none'; return; }

    // Load completed tasks for this client
    const { data: tasks } = await _supabase
        .from('tasks')
        .select('id, task_label, period_label, due_date, status, services(name, description)')
        .eq('client_id', cid)
        .eq('status', 'completed')
        .order('due_date', { ascending: false });

    // Find tasks already linked to OTHER (non-cancelled) invoices, so they
    // don't show up again as selectable in a new/different invoice.
    let invoicedElsewhereIds = new Set();
    if (tasks && tasks.length) {
        const taskIds = tasks.map(t => t.id);
        const { data: links } = await _supabase
            .from('invoice_tasks')
            .select('task_id, invoices(id, status)')
            .in('task_id', taskIds);
        (links || []).forEach(l => {
            const linkedInvoiceId = l.invoices?.id;
            const linkedStatus    = l.invoices?.status;
            const isThisInvoice   = editId && linkedInvoiceId === editId;
            const isCancelled     = linkedStatus === 'cancelled';
            if (!isThisInvoice && !isCancelled) invoicedElsewhereIds.add(l.task_id);
        });
    }

    // Exclude tasks already invoiced on another active invoice
    clientTasks = (tasks || []).filter(t => !invoicedElsewhereIds.has(t.id));

    const section = document.getElementById('taskPickerSection');
    const list    = document.getElementById('taskPickerList');

    if (!clientTasks.length) {
        section.style.display = 'none';
        return;
    }

    section.style.display = 'block';
    list.innerHTML = clientTasks.map(t => {
        const svcLabel = t.services ? `${t.services.name}${t.services.description ? ' — '+t.services.description : ''}` : (t.task_label||'');
        const checked  = preCheckedTaskIds.includes(t.id);
        return `<label class="task-pick-item${checked ? ' selected' : ''}" id="tpick_${t.id}">
            <input type="checkbox" value="${t.id}" data-label="${svcLabel}" data-period="${t.period_label||''}" ${checked ? 'checked' : ''}
                onchange="document.getElementById('tpick_'+this.value).classList.toggle('selected',this.checked);onTaskPickChange()">
            <div>
                <div style="font-size:13px;font-weight:600;color:#1f2937">${svcLabel}</div>
                <div style="font-size:11px;color:#6b7280">${t.period_label||''} ${t.due_date ? '· Due: '+fmtDate(t.due_date) : ''}</div>
            </div>
        </label>`;
    }).join('');
}

function onTaskPickChange() {
    // Add a line item for each newly checked task (if not already present)
    const checked = [...document.querySelectorAll('#taskPickerList input[type=checkbox]:checked')];
    // Get existing descriptions
    const existing = [...document.querySelectorAll('.li-desc')].map(el => el.value);
    checked.forEach(cb => {
        const desc = `${cb.dataset.label}${cb.dataset.period ? ' for the Period of ' + cb.dataset.period : ''}`;
        if (!existing.includes(desc)) {
            addLineItem(desc, '', '');
        }
    });
}

// Line items
function addLineItem(desc='', sac='', amount='') {
    lineItemCount++;
    const id = lineItemCount;
    const row = document.createElement('div');
    row.className = 'line-item-row';
    row.id = `li_${id}`;
    row.innerHTML = `
        <input type="text" class="li-desc" placeholder="Description" value="${desc}" oninput="calcTotal()">
        <input type="text" class="li-sac"  placeholder="SAC" value="${sac}" style="text-align:center">
        <input type="number" class="li-amt" placeholder="₹0" value="${amount}" min="0" step="0.01" oninput="calcTotal()" style="text-align:right">
        <button onclick="document.getElementById('li_${id}').remove();calcTotal()" style="background:none;border:none;cursor:pointer;color:#dc2626;padding:4px;font-size:15px"><i class="fas fa-times"></i></button>`;
    document.getElementById('lineItemsContainer').appendChild(row);
    calcTotal();
}

function getLineItems() {
    return [...document.querySelectorAll('.line-item-row')].map(row => ({
        description: row.querySelector('.li-desc').value.trim(),
        sac:         row.querySelector('.li-sac').value.trim(),
        amount:      parseFloat(row.querySelector('.li-amt').value) || 0
    })).filter(li => li.description);
}

function calcTotal() {
    const total = getLineItems().reduce((s, li) => s + li.amount, 0);
    document.getElementById('lineTotal').textContent = '₹' + total.toFixed(2);
}

// ── PREVIEW ──────────────────────────────────────────────────

    const invNo   = document.getElementById('inv_no').value.trim();
    const invDate = document.getElementById('inv_date').value;
    const cid     = parseInt(document.getElementById('inv_client').value);

    if (!invNo || !invDate || !client || !items.length) {
        showToast('Fill Invoice No., Date, Client and at least one line item.', 'error');
        return;
    }

    const dateStr = new Date(invDate).toLocaleDateString('en-IN', { day:'2-digit', month:'2-digit', year:'numeric' });

    // Logo image — load from assets/shree.png
    const logoSrc = await getLogoBase64() || '../../assets/shree.png';

                ${firmData.bank_holder_name ? `<span class="k">Account Holder</span><span class="v">${firmData.bank_holder_name}</span>` : ''}
                ${firmData.bank_name ? `<span class="k">Bank Name</span><span class="v">${firmData.bank_name}</span>` : ''}
                ${firmData.bank_acc_no ? `<span class="k">Account No.</span><span class="v">${firmData.bank_acc_no} (${firmData.bank_acc_type||'Saving'})</span>` : ''}

    const invoiceHtml = `

            <div style="display:flex;align-items:flex-start">

                <div>

            </div>
        </div>
        <div class="inv-center-title">INVOICE</div>
        <div class="inv-client-section" style="margin-top:14px">
            <div>
                <div class="inv-label">Bill To</div>
                <div class="inv-value">${client.name}</div>
                <div class="inv-sub">${client.address||''}</div>

        <table class="inv-table">
            <thead><tr><th>#</th><th>Description</th><th>SAC</th><th style="text-align:right">Amount</th></tr></thead>

                    <td>${i+1}</td>

async function printInvoice() {
    const html = await refreshPreview(); // also updates the on-screen #invoicePreview
    if (!html) return; // validation failed inside refreshPreview (toast already shown)
    triggerPrint(html);
}

// ── Print the invoice that was just saved, even after the form has been
// cleared for the next entry — uses the captured snapshot, not live form state.
function printSavedInvoice() {
    if (!lastSavedInvoiceHtml) return;
    closeModal('invSavedModal');
    triggerPrint(lastSavedInvoiceHtml);
}

// ── Shared print trigger: pushes invoice HTML into the dedicated hidden
// #printArea (kept outside the app layout, same as Invoices/list.html) so the
// print stylesheet can isolate it cleanly — the on-screen split layout never
// reaches the printer.
function triggerPrint(html) {
    document.getElementById('printInvoicePreview').innerHTML = html;
    document.getElementById('printArea').style.display = 'block';
    setTimeout(() => {
        window.print();
        setTimeout(() => { document.getElementById('printArea').style.display = 'none'; }, 500);
    }, 300);
}

// ── Close the success popup and make sure the form is ready for a new entry
async function startNextInvoice() {
    closeModal('invSavedModal');
    await resetInvoiceForm();
}

// ── Clear the form back to a blank "new invoice" state, with a fresh
// auto-generated invoice number, ready for the next entry.
async function resetInvoiceForm() {
    editId = null;
    editingInvoice = null;
    preCheckedTaskIds = [];

    document.getElementById('pageTitle').innerHTML = '<i class="fas fa-file-invoice"></i> Generate Invoice';
    const lbl = document.getElementById('saveBtnLabel');
    if (lbl) lbl.textContent = 'Save Invoice';

    document.getElementById('inv_client').value = '';
    document.getElementById('inv_notes').value   = '';
    document.getElementById('inv_date').value    = new Date().toISOString().split('T')[0];
    document.getElementById('taskPickerSection').style.display = 'none';
    document.getElementById('taskPickerList').innerHTML = '';
    document.getElementById('lineItemsContainer').innerHTML = '';
    lineItemCount = 0;
    addLineItem();
    calcTotal();

    document.getElementById('invoicePreview').innerHTML = `
        <div style="text-align:center;padding:40px;color:#d1d5db">
            <i class="fas fa-file-invoice" style="font-size:40px;display:block;margin-bottom:10px"></i>
            <p style="font-size:13px;color:#9ca3af">Fill in details and click Preview</p>
        </div>`;

    // Auto-generate the next invoice number
    const { count } = await _supabase.from('invoices').select('id', { count: 'exact', head: true });
    const now = new Date();
    const fy  = now.getMonth() >= 3 ? now.getFullYear() : now.getFullYear() - 1;
    const fyStr = String(fy).slice(2) + String(fy + 1).slice(2);
    document.getElementById('inv_no').value = `IN${fyStr}/${String((count || 0) + 1).padStart(3, '0')}`;
}

async function saveInvoice() {
    const invNo   = document.getElementById('inv_no').value.trim();
    const invDate = document.getElementById('inv_date').value;
    const cid     = parseInt(document.getElementById('inv_client').value);
    const notes   = document.getElementById('inv_notes').value.trim();
    const items   = getLineItems();
    const total   = items.reduce((s, li) => s + li.amount, 0);
    const taskIds = [...document.querySelectorAll('#taskPickerList input[type=checkbox]:checked')].map(cb => parseInt(cb.value));

    if (!invNo)  { showToast('Invoice number required.', 'error'); return; }
    if (!invDate){ showToast('Invoice date required.', 'error'); return; }
    if (!cid)    { showToast('Select a client.', 'error'); return; }
    if (!items.length) { showToast('Add at least one line item.', 'error'); return; }

    const btn = document.getElementById('saveInvBtn');
    const btnLabel = document.getElementById('saveBtnLabel');
    btn.disabled = true;
    btn.querySelector('i').className = 'fas fa-spinner fa-spin';
    if (btnLabel) btnLabel.textContent = editId ? 'Updating…' : 'Saving…';

    try {
        let invoiceId;

        if (editId) {
            // ── UPDATE existing invoice ──
            const { error } = await _supabase.from('invoices').update({
                invoice_no:   invNo,
                invoice_date: invDate,
                client_id:    cid,
                line_items:   JSON.stringify(items),
                total_amount: total,
                notes,
                updated_at:   new Date().toISOString()
            }).eq('id', editId);
            if (error) throw new Error(error.message);
            invoiceId = editId;

            // Re-sync task links: replace old links with the currently checked set
            await _supabase.from('invoice_tasks').delete().eq('invoice_id', editId);
            if (taskIds.length) {
                await _supabase.from('invoice_tasks').insert(taskIds.map(tid => ({ invoice_id: editId, task_id: tid })));
            }

            // Keep the linked journal entry in sync with the new total
            await syncInvoiceJournalEntry({ invoiceId, invNo, invDate, total, clientId: cid });

            await logAudit('UPDATE_INVOICE', 'invoices', editId, null, { invNo, total });
        } else {
            // ── INSERT new invoice ──
            const { data: inv, error } = await _supabase.from('invoices').insert({
                invoice_no:   invNo,
                invoice_date: invDate,
                client_id:    cid,
                line_items:   JSON.stringify(items),
                total_amount: total,
                notes,
                status:       'unpaid',
                created_at:   new Date().toISOString(),
                updated_at:   new Date().toISOString()
            }).select('id').single();
            if (error) throw new Error(error.message);
            invoiceId = inv.id;

            // Save task links
            if (taskIds.length) {
                await _supabase.from('invoice_tasks').insert(taskIds.map(tid => ({ invoice_id: invoiceId, task_id: tid })));
            }

            // Auto Journal Entry: Dr Sundry Debtors | Cr Professional Receipts
            await createInvoiceJournalEntry({ invoiceId, invNo, invDate, total, clientId: cid });

            await logAudit('CREATE_INVOICE', 'invoices', invoiceId, null, { invNo, total });
        }

        // Build the print-ready preview from the data we just saved, and capture
        // a snapshot BEFORE the form gets cleared below — this is what the
        // "Print / PDF" button in the success popup will reuse.
        lastSavedInvoiceHtml = await refreshPreview();
        lastSavedInvoiceNo   = invNo;

        if (editId) {
            showToast('Invoice updated successfully!', 'success');
            setTimeout(() => window.location.href = ROUTES.invoiceList(), 700);
        } else {
            showToast('Invoice saved!', 'success');
            document.getElementById('savedInvNoLabel').textContent = invNo;
            openModal('invSavedModal');
            await resetInvoiceForm();
        }
    } catch(err) {
        showToast(err.message, 'error');
    } finally {
        btn.disabled = false;
        btn.querySelector('i').className = 'fas fa-save';
        if (btnLabel) btnLabel.textContent = editId ? 'Update Invoice' : 'Save Invoice';
    }
}

// ── Sync existing Journal Entry when an Invoice is edited ────
// (avoids creating a duplicate JE; updates header narration + line amounts)
async function syncInvoiceJournalEntry({ invoiceId, invNo, invDate, total, clientId }) {
    try {
        const { data: entry } = await _supabase.from('journal_entries')
            .select('id').eq('source_table', 'invoices').eq('source_id', invoiceId)
            .eq('entry_type', 'Sales').maybeSingle();

        if (!entry) {
            // No JE existed yet (e.g. created before JE feature, or backfill skipped it) — create one now.
            await createInvoiceJournalEntry({ invoiceId, invNo, invDate, total, clientId });
            return;
        }

        const { data: accs } = await _supabase.from('accounts')
            .select('id,name').in('name', ['Sundry Debtors', 'Professional Receipts']);
        if (!accs || accs.length < 2) return;
        const drAcc = accs.find(a => a.name === 'Sundry Debtors');
        const crAcc = accs.find(a => a.name === 'Professional Receipts');
        if (!drAcc || !crAcc) return;

        await _supabase.from('journal_entries').update({
            entry_date: invDate,
            narration:  `Being Invoice No. ${invNo} raised — professional services rendered`
        }).eq('id', entry.id);

        const { data: lines } = await _supabase.from('journal_lines')
            .select('id,dr_amount,cr_amount').eq('entry_id', entry.id).order('id');
        if (!lines || lines.length < 2) return;

        const drLine = lines.find(l => parseFloat(l.dr_amount || 0) > 0) || lines[0];
        const crLine = lines.find(l => parseFloat(l.cr_amount || 0) > 0) || lines[1];

        await _supabase.from('journal_lines').update({
            account_id: drAcc.id, dr_amount: total, cr_amount: 0,
            client_id: clientId, invoice_id: invoiceId, narration: `Debtor: Invoice ${invNo}`
        }).eq('id', drLine.id);

        await _supabase.from('journal_lines').update({
            account_id: crAcc.id, dr_amount: 0, cr_amount: total,
            invoice_id: invoiceId, narration: `Sales: Invoice ${invNo}`
        }).eq('id', crLine.id);

    } catch (e) {
        console.warn('Sync Invoice JE failed (non-critical):', e.message);
    }
}

// ── Number to Words ──────────────────────────────────────────
function amountToWords(amount) {
    const ones = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine',
        'Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
    const tens = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
    function twoDigit(n) {
        if (n < 20) return ones[n];
        return tens[Math.floor(n/10)] + (n%10 ? ' ' + ones[n%10] : '');
    }
    function threeDigit(n) {
        if (n >= 100) return ones[Math.floor(n/100)] + ' Hundred' + (n%100 ? ' ' + twoDigit(n%100) : '');
        return twoDigit(n);
    }
    const n = Math.floor(amount);
    if (n === 0) return 'Zero';
    let result = '';
    if (n >= 10000000) result += threeDigit(Math.floor(n/10000000)) + ' Crore ';
    if (n >= 100000)   result += threeDigit(Math.floor((n%10000000)/100000)) + ' Lakh ';
    if (n >= 1000)     result += threeDigit(Math.floor((n%100000)/1000)) + ' Thousand ';
    result += threeDigit(n%1000);
    return result.trim();
}

// ── Auto Journal Entry when Invoice is saved ─────────────────
// Accounting rule:
//   Dr: Sundry Debtors A/c  (client now owes us → current asset ↑)
//   Cr: Professional Receipts A/c  (income earned → income ↑)
async function createInvoiceJournalEntry({ invoiceId, invNo, invDate, total, clientId }) {
    try {
        // Fetch the two required accounts
        const { data: accs } = await _supabase.from('accounts')
            .select('id,name')
            .in('name', ['Sundry Debtors', 'Professional Receipts']);
        if (!accs || accs.length < 2) return;  // Accounts not set up yet — skip silently

        const drAcc = accs.find(a => a.name === 'Sundry Debtors');
        const crAcc = accs.find(a => a.name === 'Professional Receipts');
        if (!drAcc || !crAcc) return;

        // Derive financial year from invoice date
        const d  = new Date(invDate);
        const yr = d.getMonth() >= 3 ? d.getFullYear() : d.getFullYear() - 1;
        const fy = `${yr}-${String(yr + 1).slice(-2)}`;

        // Auto-number: SJV = Sales Journal Voucher
        const { count } = await _supabase.from('journal_entries')
            .select('id', { count: 'exact', head: true })
            .eq('financial_year', fy)
            .eq('entry_type', 'Sales');
        const jeNo = `SJV-${fy}-${String((count || 0) + 1).padStart(3, '0')}`;

        // Insert journal entry header
        const { data: prof } = await _supabase.auth.getUser();
        const { data: entry, error: jeErr } = await _supabase.from('journal_entries').insert({
            entry_no:       jeNo,
            entry_date:     invDate,
            entry_type:     'Sales',
            narration:      `Being Invoice No. ${invNo} raised — professional services rendered`,
            is_auto:        true,
            source_table:   'invoices',
            source_id:      invoiceId,
            financial_year: fy,
            created_by:     prof?.user?.id
        }).select('id').single();
        if (jeErr) { console.warn('Invoice JE header error:', jeErr.message); return; }

        // Insert Dr/Cr lines
        const { error: lErr } = await _supabase.from('journal_lines').insert([
            {
                entry_id:   entry.id,
                account_id: drAcc.id,       // Dr: Sundry Debtors
                dr_amount:  total,
                cr_amount:  0,
                client_id:  clientId,
                invoice_id: invoiceId,
                narration:  `Debtor: Invoice ${invNo}`
            },
            {
                entry_id:   entry.id,
                account_id: crAcc.id,       // Cr: Professional Receipts
                dr_amount:  0,
                cr_amount:  total,
                invoice_id: invoiceId,
                narration:  `Sales: Invoice ${invNo}`
            }
        ]);
        if (lErr) console.warn('Invoice JE lines error:', lErr.message);

    } catch (e) {
        console.warn('Invoice auto-JE failed (non-critical):', e.message);
        // Non-critical: invoice already saved; JE failure must not block the user
    }
}
