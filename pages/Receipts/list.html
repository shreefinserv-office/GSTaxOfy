<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GStaxOfy — All Receipts</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="manifest" href="../../manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="GStaxOfy">
    <link rel="apple-touch-icon" href="../../assets/icon-192.png">
</head>
<body>
<div class="app-container">
    <header class="header">
        <div class="logo-section">
            <div class="ca-logo"><img src="../../assets/logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="ca-logo-text" style="display:none">CA</span></div>
            <div class="company-info"><h1 id="firmNameHeader">GStaxOfy</h1><p>GSTaxOfy</p></div>
        </div>
        <div class="user-info" onclick="toggleUserDropdown()">
            <div class="user-avatar" id="headerAvatar">G</div>
            <div class="user-details"><div class="user-name" id="headerUserName">Loading…</div><div class="user-role" id="headerUserRole"></div></div>
            <i class="fas fa-chevron-down" style="color:#6b7280;font-size:12px;margin-left:4px"></i>
            <div class="user-dropdown" id="userDropdown">
                <div class="user-dropdown-item" onclick="window.location.href=ROUTES.changePassword()"><i class="fas fa-key"></i> Change Password</div>
                <div class="user-dropdown-item danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</div>
            </div>
        </div>
    </header>
    <div class="main-content">
        <aside class="sidebar" id="sidebar-placeholder"></aside>
        <main class="content-area">
            <div class="section-header">
                <div class="page-title" style="margin:0"><i class="fas fa-receipt"></i> All Receipts</div>
                <button class="btn btn-success" onclick="window.location.href=ROUTES.generateReceipt()"><i class="fas fa-plus"></i> New Receipt</button>
            </div>

            <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px">
                <input type="text" id="searchInput" placeholder="Search receipt no. or client…" oninput="filterReceipts()"
                    style="padding:7px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;min-width:200px">
                <select id="filterMode" onchange="filterReceipts()" style="padding:7px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;background:#fff">
                    <option value="">All Modes</option>
                    <option value="Cash">Cash</option>
                    <option value="UPI">UPI</option>
                    <option value="NEFT">NEFT</option>
                    <option value="RTGS">RTGS</option>
                    <option value="Cheque">Cheque</option>
                    <option value="Bank Transfer">Bank Transfer</option>
                </select>
                <input type="month" id="filterMonth" onchange="filterReceipts()" style="padding:7px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px">
            </div>

            <div id="rcptStats" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px"></div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>#</th><th>Receipt No.</th><th>Date</th><th>Client</th><th>Invoice</th><th>Amount</th><th>Mode</th><th>Ref. No.</th></tr>
                    </thead>
                    <tbody id="rcptBody">
                        <tr><td colspan="8" style="text-align:center;padding:30px;color:#9ca3af"><i class="fas fa-spinner fa-spin"></i> Loading…</td></tr>
                    </tbody>
                </table>
            </div>
            <div id="rcptFooter" style="text-align:right;padding:10px 4px;font-size:13px;color:#6b7280"></div>
        </main>
    </div>
</div>
<div class="modal-overlay" id="logoutModal">
    <div class="modal-box" style="max-width:340px">
        <div class="modal-header"><span class="modal-title">Confirm Logout</span><button class="modal-close" onclick="closeModal('logoutModal')">&times;</button></div>
        <p style="color:#6b7280;margin-bottom:20px;text-align:center">Are you sure you want to logout?</p>
        <div style="display:flex;gap:10px;justify-content:center">
            <button class="btn btn-secondary" onclick="closeModal('logoutModal')">Cancel</button>
            <button class="btn btn-danger" onclick="confirmLogout()">Yes, Logout</button>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../js/supabase-config.js"></script>
<script src="../../js/app.js"></script>
<script src="../../js/sidebar.js"></script>
<script src="../../js/layout.js"></script>
<script>
let allReceipts = [];

(async () => {
    const profile = await initLayout();
    if (!profile) return;
    renderSidebar('receipts');
    setActiveNav();
    const { data: firm } = await _supabase.from('firm_details').select('firm_name').single();
    if (firm) document.getElementById('firmNameHeader').textContent = firm.firm_name;
    await loadReceipts();
})();

async function loadReceipts() {
    const { data, error } = await _supabase
        .from('receipts')
        .select('*, clients(name), invoices(invoice_no)')
        .order('receipt_date', { ascending: false });
    if (error) { showToast('Failed to load receipts.', 'error'); return; }
    allReceipts = data || [];
    renderStats();
    filterReceipts();
}

function renderStats() {
    const total = allReceipts.reduce((s, r) => s + parseFloat(r.amount||0), 0);
    const byMode = {};
    allReceipts.forEach(r => { byMode[r.payment_mode] = (byMode[r.payment_mode]||0) + parseFloat(r.amount||0); });
    const topMode = Object.entries(byMode).sort((a,b) => b[1]-a[1])[0];
    document.getElementById('rcptStats').innerHTML = `
        <div style="background:#dcfce7;border-radius:8px;padding:8px 16px;display:flex;align-items:center;gap:8px">
            <span style="font-size:18px;font-weight:700;color:#14532d">${allReceipts.length}</span>
            <span style="font-size:12px;color:#14532d;font-weight:600">Total Receipts</span>
        </div>
        <div style="background:#dbeafe;border-radius:8px;padding:8px 16px;display:flex;align-items:center;gap:8px">
            <span style="font-size:18px;font-weight:700;color:#1e40af">₹${total.toLocaleString('en-IN',{minimumFractionDigits:2})}</span>
            <span style="font-size:12px;color:#1e40af;font-weight:600">Total Collected</span>
        </div>
        ${topMode ? `<div style="background:#f3e8ff;border-radius:8px;padding:8px 16px;display:flex;align-items:center;gap:8px">
            <span style="font-size:18px;font-weight:700;color:#6b21a8">${topMode[0]}</span>
            <span style="font-size:12px;color:#6b21a8;font-weight:600">Top Mode</span>
        </div>` : ''}`;
}

function filterReceipts() {
    const q  = document.getElementById('searchInput').value.toLowerCase();
    const mo = document.getElementById('filterMode').value;
    const mn = document.getElementById('filterMonth').value; // YYYY-MM
    const filtered = allReceipts.filter(r => {
        if (mo && r.payment_mode !== mo) return false;
        if (mn && r.receipt_date && !r.receipt_date.startsWith(mn)) return false;
        if (q && !(r.receipt_no||'').toLowerCase().includes(q) && !(r.clients?.name||'').toLowerCase().includes(q)) return false;
        return true;
    });
    renderTable(filtered);
}

function renderTable(receipts) {
    const body = document.getElementById('rcptBody');
    if (!receipts.length) {
        body.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:30px;color:#9ca3af">No receipts found.</td></tr>';
        document.getElementById('rcptFooter').textContent = '';
        return;
    }
    const total = receipts.reduce((s,r)=>s+parseFloat(r.amount||0),0);
    body.innerHTML = receipts.map((r,i) => `<tr>
        <td>${i+1}</td>
        <td><code style="background:#f0fdf4;padding:2px 6px;border-radius:4px;font-size:12px;color:#14532d">${r.receipt_no||'—'}</code></td>
        <td style="font-size:12px">${fmtDate(r.receipt_date)}</td>
        <td><strong>${r.clients?.name||'—'}</strong></td>
        <td style="font-size:12px;color:#6b7280">${r.invoices?.invoice_no||'—'}</td>
        <td><strong style="color:#059669">₹ ${parseFloat(r.amount||0).toFixed(2)}</strong></td>
        <td><span class="badge badge-blue" style="font-size:11px">${r.payment_mode||'—'}</span></td>
        <td style="font-size:12px;color:#6b7280">${r.reference_no||'—'}</td>
    </tr>`).join('');
    document.getElementById('rcptFooter').innerHTML = `<strong>Showing ${receipts.length} receipt(s) — Total: <span style="color:#059669">₹${total.toLocaleString('en-IN',{minimumFractionDigits:2})}</span></strong>`;
}
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('../../sw.js').catch(()=>{})}</script>
</body>
</html>
