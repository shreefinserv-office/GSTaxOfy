<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GStaxOfy — Generate Receipt</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="manifest" href="../../manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="GStaxOfy">
    <link rel="apple-touch-icon" href="../../assets/icon-192.png">
    <style>
        /* ── Print area exactly matches the PDF format ── */
        .rcpt-paper {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 36px 40px;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 14px;
            color: #111;
            max-width: 560px;
        }
        .rcpt-firm-name  { font-size: 20px; font-weight: 700; color: #1f2937; margin-bottom: 2px; }
        .rcpt-firm-addr  { font-size: 12px; color: #444; line-height: 1.6; margin-bottom: 2px; }
        .rcpt-firm-phone { font-size: 12px; color: #444; }
        .rcpt-firm-email { font-size: 12px; color: #444; margin-bottom: 16px; }
        .rcpt-divider    { border: none; border-top: 1.5px solid #333; margin: 12px 0; }
        .rcpt-title-row  { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .rcpt-heading    { font-size: 22px; font-weight: 800; letter-spacing: 2px; color: #1f2937; }
        .rcpt-meta       { text-align: right; font-size: 13px; color: #333; line-height: 1.8; }
        .rcpt-body       { font-size: 14px; color: #111; line-height: 1.8; margin: 18px 0 14px; }
        .rcpt-words      { font-size: 13px; color: #333; margin-bottom: 24px; }
        .rcpt-sign       { font-size: 14px; font-weight: 600; color: #1f2937; margin-top: 28px; }
        .rcpt-footer     { margin-top: 16px; font-size: 12px; color: #888; border-top: 1px solid #e5e7eb; padding-top: 10px; text-align: center; }

        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; padding: 30px; box-sizing: border-box; }
            .rcpt-paper { border: none; border-radius: 0; padding: 0; box-shadow: none; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <header class="header">
        <div class="logo-section">
            <div class="ca-logo"><img src="../../assets/logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="ca-logo-text" style="display:none">CA</span></div>
            <div class="company-info"><h1 id="firmNameHeader">GStaxOfy</h1><p>GSTaxOfy</p></div>
        </div>
        <div class="user-info" onclick="toggleUserDropdown()">
            <div class="user-avatar" id="headerAvatar">G</div>
            <div class="user-details"><div class="user-name" id="headerUserName">Loading…</div><div class="user-role" id="headerUserRole"></div></div>
            <i class="fas fa-chevron-down" style="color:#6b7280;font-size:12px;margin-left:4px"></i>
            <div class="user-dropdown" id="userDropdown">
                <div class="user-dropdown-item" onclick="window.location.href=ROUTES.changePassword()"><i class="fas fa-key"></i> Change Password</div>
                <div class="user-dropdown-item danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</div>
            </div>
        </div>
    </header>
    <div class="main-content">
        <aside class="sidebar" id="sidebar-placeholder"></aside>
        <main class="content-area">
            <div class="section-header">
                <div class="page-title" style="margin:0" id="pageTitle"><i class="fas fa-receipt"></i> Generate Receipt</div>
                <button class="btn btn-secondary" onclick="window.location.href=ROUTES.receiptList()"><i class="fas fa-list"></i> All Receipts</button>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start">

                <!-- LEFT: Form -->
                <div style="background:#fff;border:1.5px solid #e5e7eb;border-radius:10px;padding:20px">
                    <h3 style="font-size:14px;font-weight:700;color:#1f2937;margin:0 0 16px;display:flex;align-items:center;gap:8px">
                        <i class="fas fa-edit" style="color:#059669"></i> Receipt Details
                    </h3>

                    <div class="form-group" style="margin-bottom:12px">
                        <label style="font-size:12px">Receipt No. *</label>
                        <input type="text" id="rcp_no" placeholder="e.g. RC2526/028"
                            style="padding:8px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;width:100%;box-sizing:border-box">
                    </div>
                    <div class="form-group" style="margin-bottom:12px">
                        <label style="font-size:12px">Receipt Date *</label>
                        <input type="date" id="rcp_date"
                            style="padding:8px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;width:100%;box-sizing:border-box">
                    </div>
                    <div class="form-group" style="margin-bottom:12px">
                        <label style="font-size:12px">Client *</label>
                        <select id="rcp_client" onchange="onRcpClientChange()"
                            style="padding:8px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;width:100%;background:#fff;box-sizing:border-box">
                            <option value="">— Select Client —</option>
                        </select>
                    </div>

                    <!-- Unpaid invoices picker -->
                    <div id="invPickerSection" style="display:none;margin-bottom:12px">
                        <label style="font-size:12px;font-weight:600;color:#374151;display:flex;align-items:center;gap:6px;margin-bottom:6px">
                            <i class="fas fa-file-invoice" style="color:#2563eb"></i> Against Invoice (optional)
                        </label>
                        <select id="rcp_invoice" onchange="onInvSelect()"
                            style="padding:8px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;width:100%;background:#fff;box-sizing:border-box">
                            <option value="">— No specific invoice —</option>
                        </select>
                    </div>

                    <div class="form-group" style="margin-bottom:12px">
                        <label style="font-size:12px">Amount Received (₹) *</label>
                        <input type="number" id="rcp_amount" placeholder="0.00" min="0" step="0.01"
                            oninput="calcBalance()"
                            style="padding:8px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;width:100%;box-sizing:border-box">
                    </div>
                    <div class="form-group" style="margin-bottom:12px">
                        <label style="font-size:12px">Payment Mode *</label>
                        <select id="rcp_mode"
                            style="padding:8px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;width:100%;background:#fff;box-sizing:border-box">
                            <option value="Cash">Cash</option>
                            <option value="UPI">UPI</option>
                            <option value="NEFT">NEFT</option>
                            <option value="RTGS">RTGS</option>
                            <option value="Cheque">Cheque</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom:12px">
                        <label style="font-size:12px">Reference / Transaction ID</label>
                        <input type="text" id="rcp_ref" placeholder="UTR / Cheque No. / Transaction ID"
                            style="padding:8px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;width:100%;box-sizing:border-box">
                    </div>

                    <div id="balanceInfo" style="display:none;background:#fef9c3;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#92400e"></div>

                    <div class="form-group" style="margin-bottom:16px">
                        <label style="font-size:12px">Notes (optional, printed below receipt)</label>
                        <textarea id="rcp_notes" rows="2" placeholder="Optional additional notes…"
                            style="resize:vertical;padding:8px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;width:100%;box-sizing:border-box"></textarea>
                    </div>

                    <div style="display:flex;gap:8px">
                        <button class="btn btn-secondary" style="flex:1" onclick="refreshRcpPreview()"><i class="fas fa-eye"></i> Preview</button>
                        <button class="btn btn-success" style="flex:1" id="saveRcpBtn" onclick="saveReceipt()"><i class="fas fa-save"></i> <span id="saveBtnLabel">Save Receipt</span></button>
                    </div>
                </div>

                <!-- RIGHT: Preview -->
                <div style="background:#fff;border:1.5px solid #e5e7eb;border-radius:10px;padding:20px">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
                        <h3 style="font-size:14px;font-weight:700;color:#1f2937;margin:0;display:flex;align-items:center;gap:8px">
                            <i class="fas fa-file-pdf" style="color:#dc2626"></i> Receipt Preview
                        </h3>
                        <button class="btn btn-danger btn-sm" onclick="printReceipt()"><i class="fas fa-print"></i> Print / PDF</button>
                    </div>
                    <div id="printArea">
                        <div class="rcpt-paper" id="receiptPreview">
                            <div style="text-align:center;padding:40px;color:#d1d5db">
                                <i class="fas fa-receipt" style="font-size:40px;display:block;margin-bottom:10px"></i>
                                <p style="font-size:13px;color:#9ca3af">Fill in details and click Preview</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<div class="modal-overlay" id="logoutModal">
    <div class="modal-box" style="max-width:340px">
        <div class="modal-header"><span class="modal-title">Confirm Logout</span><button class="modal-close" onclick="closeModal('logoutModal')">&times;</button></div>
        <p style="color:#6b7280;margin-bottom:20px;text-align:center">Are you sure you want to logout?</p>
        <div style="display:flex;gap:10px;justify-content:center">
            <button class="btn btn-secondary" onclick="closeModal('logoutModal')">Cancel</button>
            <button class="btn btn-danger" onclick="confirmLogout()">Yes, Logout</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../js/supabase-config.js"></script>
<script src="../../js/app.js"></script>
<script src="../../js/sidebar.js"></script>
<script src="../../js/layout.js"></script>
<script>
let allClients = [], firmData = {}, clientInvoices = [];
let editId = null, editingReceipt = null;

(async () => {
    const profile = await initLayout();
    if (!profile) return;
    renderSidebar('generate-receipt');
    setActiveNav();

    const params = new URLSearchParams(window.location.search);
    editId = parseInt(params.get('id')) || null;

    document.getElementById('rcp_date').value = new Date().toISOString().split('T')[0];

    const [{ data: firm }, { data: clients }] = await Promise.all([
        _supabase.from('firm_details').select('*').single(),
        _supabase.from('clients').select('id,name,address,contact_no,email_id').eq('is_active', true).order('name')
    ]);
    if (firm) {
        firmData = firm;
        document.getElementById('firmNameHeader').textContent = firm.firm_name;
    }
    allClients = clients || [];
    allClients.forEach(c => document.getElementById('rcp_client').innerHTML += `<option value="${c.id}">${c.name}</option>`);

    if (editId) {
        await loadReceiptForEdit(editId);
    } else {
        // Auto receipt number: RC + YYYY + /NNN
        const { count } = await _supabase.from('receipts').select('id', { count: 'exact', head: true });
        const now = new Date();
        const fy  = now.getMonth() >= 3 ? now.getFullYear() : now.getFullYear() - 1;
        const fyStr = String(fy).slice(2) + String(fy + 1).slice(2);
        document.getElementById('rcp_no').value = `RC${fyStr}/${String((count || 0) + 1).padStart(3, '0')}`;
    }
})();

async function loadReceiptForEdit(id) {
    const { data: r, error } = await _supabase
        .from('receipts')
        .select('*, clients(name), invoices(id,invoice_no,total_amount)')
        .eq('id', id)
        .single();
    if (error || !r) { showToast('Receipt not found.', 'error'); return; }
    editingReceipt = r;

    // Switch page into edit mode visually
    document.getElementById('pageTitle').innerHTML = '<i class="fas fa-receipt"></i> Edit Receipt';
    document.getElementById('saveBtnLabel').textContent = 'Update Receipt';

    document.getElementById('rcp_no').value     = r.receipt_no || '';
    document.getElementById('rcp_no').readOnly  = true; // keep receipt no. stable once created
    document.getElementById('rcp_no').style.background = '#f3f4f6';
    document.getElementById('rcp_date').value   = r.receipt_date || '';
    document.getElementById('rcp_client').value = r.client_id || '';
    document.getElementById('rcp_amount').value = r.amount || '';
    document.getElementById('rcp_mode').value    = r.payment_mode || 'Cash';
    document.getElementById('rcp_ref').value     = r.reference_no || '';
    document.getElementById('rcp_notes').value   = r.notes || '';

    // Load this client's unpaid invoices, then make sure the receipt's
    // own linked invoice is present too (even if it's since been marked paid).
    await onRcpClientChange();
    if (r.invoice_id) {
        const sel = document.getElementById('rcp_invoice');
        let opt = Array.from(sel.options).find(o => parseInt(o.value) === r.invoice_id);
        if (!opt && r.invoices) {
            opt = document.createElement('option');
            opt.value = r.invoices.id;
            opt.dataset.no  = r.invoices.invoice_no;
            opt.dataset.amt = r.invoices.total_amount;
            opt.textContent = `${r.invoices.invoice_no} — ₹${parseFloat(r.invoices.total_amount).toFixed(2)}`;
            sel.appendChild(opt);
        }
        sel.value = r.invoice_id;
        document.getElementById('invPickerSection').style.display = 'block';
        calcBalance();
    }

    refreshRcpPreview();
}

async function onRcpClientChange() {
    const cid = parseInt(document.getElementById('rcp_client').value);
    const sec = document.getElementById('invPickerSection');
    if (!cid) { sec.style.display = 'none'; return; }

    const { data } = await _supabase
        .from('invoices')
        .select('id,invoice_no,total_amount')
        .eq('client_id', cid)
        .eq('status', 'unpaid')
        .order('invoice_date', { ascending: false });
    clientInvoices = data || [];

    const sel = document.getElementById('rcp_invoice');
    sel.innerHTML = '<option value="">— No specific invoice —</option>' +
        clientInvoices.map(inv => `<option value="${inv.id}" data-no="${inv.invoice_no}" data-amt="${inv.total_amount}">
            ${inv.invoice_no} — ₹${parseFloat(inv.total_amount).toFixed(2)} (Unpaid)
        </option>`).join('');
    sec.style.display = clientInvoices.length ? 'block' : 'none';
    calcBalance();
}

function onInvSelect() {
    const sel = document.getElementById('rcp_invoice');
    const opt = sel.options[sel.selectedIndex];
    const amt = parseFloat(opt.dataset.amt || 0);
    if (amt) document.getElementById('rcp_amount').value = amt.toFixed(2);
    calcBalance();
}

function calcBalance() {
    const invSel = document.getElementById('rcp_invoice');
    const opt    = invSel.options[invSel.selectedIndex];
    const invAmt = parseFloat(opt?.dataset?.amt || 0);
    const rcpAmt = parseFloat(document.getElementById('rcp_amount').value) || 0;
    const balEl  = document.getElementById('balanceInfo');
    if (invAmt && rcpAmt) {
        const bal = invAmt - rcpAmt;
        balEl.style.display = 'block';
        balEl.innerHTML = bal > 0
            ? `<i class="fas fa-info-circle"></i> Invoice ₹${invAmt.toFixed(2)} — Paying ₹${rcpAmt.toFixed(2)} — <strong>Balance due: ₹${bal.toFixed(2)}</strong>`
            : bal === 0
            ? `<i class="fas fa-check-circle" style="color:#16a34a"></i> <strong>Full payment — Invoice will be marked Paid</strong>`
            : `<i class="fas fa-exclamation-triangle"></i> Amount exceeds invoice by ₹${Math.abs(bal).toFixed(2)}`;
    } else {
        balEl.style.display = 'none';
    }
}

function amountToWords(amount) {
    const ones = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten',
        'Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
    const tens = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
    function t(n) { return n < 20 ? ones[n] : tens[Math.floor(n/10)] + (n%10 ? ' ' + ones[n%10] : ''); }
    function h(n) { return n >= 100 ? ones[Math.floor(n/100)] + ' Hundred' + (n%100 ? ' ' + t(n%100) : '') : t(n); }
    const n = Math.floor(amount);
    if (!n) return 'Zero';
    let r = '';
    if (n >= 10000000) r += h(Math.floor(n/10000000)) + ' Crore ';
    if (n >= 100000)   r += h(Math.floor((n%10000000)/100000)) + ' Lakh ';
    if (n >= 1000)     r += h(Math.floor((n%100000)/1000)) + ' Thousand ';
    return (r + h(n%1000)).trim();
}

function refreshRcpPreview() {
    const no     = document.getElementById('rcp_no').value.trim();
    const date   = document.getElementById('rcp_date').value;
    const cid    = parseInt(document.getElementById('rcp_client').value);
    const amount = parseFloat(document.getElementById('rcp_amount').value) || 0;
    const mode   = document.getElementById('rcp_mode').value;
    const ref    = document.getElementById('rcp_ref').value.trim();
    const notes  = document.getElementById('rcp_notes').value.trim();
    const client = allClients.find(c => c.id === cid);

    const invSel = document.getElementById('rcp_invoice');
    const invOpt = invSel.options[invSel.selectedIndex];
    const invNo  = invOpt?.dataset?.no || '';

    if (!no || !date || !client || !amount) {
        showToast('Fill Receipt No., Date, Client and Amount.', 'error');
        return;
    }

    // Format date as DD/MM/YYYY
    const [y, m, d] = date.split('-');
    const dateStr = `${d}/${m}/${y}`;

    // Sentence body — matches PDF format exactly
    const invPart = invNo ? ` against Invoice No. ${invNo}` : '';
    const refPart = ref ? ` (Ref: ${ref})` : '';
    const bodyText = `Received from <strong>${client.name}</strong> amount of <strong>₹${amount.toFixed(2)}</strong> by <strong>${mode}</strong>${refPart}${invPart}.`;

    document.getElementById('receiptPreview').innerHTML = `
        <div class="rcpt-firm-name">${firmData.firm_name || ''}</div>
        <div class="rcpt-firm-addr">${(firmData.firm_address || '').replace(/\n/g, '<br>')}</div>
        ${firmData.phone ? `<div class="rcpt-firm-phone">${firmData.phone}${firmData.email_id ? ' | ' + firmData.email_id : ''}</div>` : ''}
        <hr class="rcpt-divider">
        <div class="rcpt-title-row">
            <div class="rcpt-heading">Receipt</div>
            <div class="rcpt-meta">
                <div><strong>Receipt No.:</strong> ${no}</div>
                <div><strong>Date:</strong> ${dateStr}</div>
            </div>
        </div>
        <hr class="rcpt-divider">
        <div class="rcpt-body">${bodyText}</div>
        <div class="rcpt-words"><strong>Amount in Words:</strong> ${amountToWords(amount)} Rupees Only</div>
        ${notes ? `<div style="font-size:13px;color:#444;margin-bottom:12px">${notes}</div>` : ''}
        <div class="rcpt-sign">For ${firmData.firm_name || ''}</div>
        <div class="rcpt-footer">
            Thank You.<br>
            This is computer generated receipt no signature required.
        </div>`;
}

function printReceipt() {
    refreshRcpPreview();
    setTimeout(() => window.print(), 300);
}

async function saveReceipt() {
    const no     = document.getElementById('rcp_no').value.trim();
    const date   = document.getElementById('rcp_date').value;
    const cid    = parseInt(document.getElementById('rcp_client').value);
    const amount = parseFloat(document.getElementById('rcp_amount').value) || 0;
    const mode   = document.getElementById('rcp_mode').value;
    const ref    = document.getElementById('rcp_ref').value.trim();
    const notes  = document.getElementById('rcp_notes').value.trim();
    const invSel = document.getElementById('rcp_invoice');
    const invId  = parseInt(invSel.value) || null;
    const invOpt = invSel.options[invSel.selectedIndex];
    const invAmt = parseFloat(invOpt?.dataset?.amt || 0);

    if (!no)     { showToast('Receipt number required.', 'error'); return; }
    if (!date)   { showToast('Date required.', 'error'); return; }
    if (!cid)    { showToast('Select a client.', 'error'); return; }
    if (!amount) { showToast('Enter amount received.', 'error'); return; }

    const btn = document.getElementById('saveRcpBtn');
    const btnLabel = document.getElementById('saveBtnLabel');
    btn.disabled = true;
    btn.querySelector('i').className = 'fas fa-spinner fa-spin';
    btnLabel.textContent = editId ? 'Updating…' : 'Saving…';

    try {
        let receiptId;

        if (editId) {
            // ── UPDATE existing receipt ──
            const { error } = await _supabase.from('receipts').update({
                receipt_date: date,
                client_id:    cid,
                invoice_id:   invId,
                amount,
                payment_mode: mode,
                reference_no: ref,
                notes,
                updated_at: new Date().toISOString()
            }).eq('id', editId);
            if (error) throw new Error(error.message);
            receiptId = editId;

            // Keep the linked journal entry's lines in sync with the new amount/mode
            await syncReceiptJournalEntry({ receiptId, date, no, amount, mode, clientId: cid, invoiceId: invId });

            await logAudit('UPDATE_RECEIPT', 'receipts', editId, null, { no, amount, client_id: cid });
        } else {
            // ── INSERT new receipt ──
            const { data: savedReceipt, error } = await _supabase.from('receipts').insert({
                receipt_no:   no,
                receipt_date: date,
                client_id:    cid,
                invoice_id:   invId,
                amount,
                payment_mode: mode,
                reference_no: ref,
                notes,
                created_at: new Date().toISOString(),
                updated_at: new Date().toISOString()
            }).select('id').single();
            if (error) throw new Error(error.message);
            receiptId = savedReceipt.id;

            // ── Auto Journal Entry for new Receipt ──
            await createReceiptJournalEntry({ receiptId, date, no, amount, mode, clientId: cid, invoiceId: invId });

            await logAudit('CREATE_RECEIPT', 'receipts', null, null, { no, amount, client_id: cid });
        }

        // If full or over payment against invoice → mark invoice paid
        if (invId && invAmt && amount >= invAmt) {
            await _supabase.from('invoices')
                .update({ status: 'paid', updated_at: new Date().toISOString() })
                .eq('id', invId);
        }

        refreshRcpPreview();
        showToast(editId ? 'Receipt updated successfully!' : 'Receipt saved successfully!', 'success');
        if (editId) setTimeout(() => window.location.href = ROUTES.receiptList(), 700);
    } catch (err) {
        showToast(err.message, 'error');
    } finally {
        btn.disabled = false;
        btn.querySelector('i').className = 'fas fa-save';
        btnLabel.textContent = editId ? 'Update Receipt' : 'Save Receipt';
    }
}

// ── Sync existing Journal Entry when a Receipt is edited ─────
// (avoids creating a duplicate JE; updates header narration + line amounts/accounts)
async function syncReceiptJournalEntry({ receiptId, date, no, amount, mode, clientId, invoiceId }) {
    try {
        const { data: entry } = await _supabase.from('journal_entries')
            .select('id').eq('source_table', 'receipts').eq('source_id', receiptId)
            .eq('entry_type', 'Receipt').maybeSingle();

        if (!entry) {
            // No JE existed yet (e.g. created before JE feature, or backfill skipped it) — create one now.
            await createReceiptJournalEntry({ receiptId, date, no, amount, mode, clientId, invoiceId });
            return;
        }

        const isCash = (mode || '').toLowerCase() === 'cash';
        const drAccName = isCash ? 'Cash-in-Hand' : 'Bank Account';
        const { data: accs } = await _supabase.from('accounts')
            .select('id,name').in('name', [drAccName, 'Professional Receipts']);
        if (!accs || accs.length < 2) return;
        const drAcc = accs.find(a => a.name === drAccName);
        const crAcc = accs.find(a => a.name === 'Professional Receipts');
        if (!drAcc || !crAcc) return;

        await _supabase.from('journal_entries').update({
            entry_date: date,
            narration:  `Being receipt no. ${no} received via ${mode}`
        }).eq('id', entry.id);

        const { data: lines } = await _supabase.from('journal_lines')
            .select('id,dr_amount,cr_amount').eq('entry_id', entry.id).order('id');
        if (!lines || lines.length < 2) return;

        const drLine = lines.find(l => parseFloat(l.dr_amount || 0) > 0) || lines[0];
        const crLine = lines.find(l => parseFloat(l.cr_amount || 0) > 0) || lines[1];

        await _supabase.from('journal_lines').update({
            account_id: drAcc.id, dr_amount: amount, cr_amount: 0,
            client_id: clientId, narration: `${isCash ? 'Cash' : 'Bank'} received: ${no}`
        }).eq('id', drLine.id);

        await _supabase.from('journal_lines').update({
            account_id: crAcc.id, dr_amount: 0, cr_amount: amount,
            invoice_id: invoiceId || null, narration: `Receipt: ${no}`
        }).eq('id', crLine.id);

    } catch (e) {
        console.warn('Sync JE failed (non-critical):', e.message);
    }
}

async function createReceiptJournalEntry({ receiptId, date, no, amount, mode, clientId, invoiceId }) {
    try {
        // 1. Resolve account IDs from accounts table
        const isCash = (mode || '').toLowerCase() === 'cash';
        const drAccName = isCash ? 'Cash-in-Hand' : 'Bank Account';

        const { data: accs } = await _supabase.from('accounts')
            .select('id,name').in('name', [drAccName, 'Professional Receipts', 'Sundry Debtors']);
        if (!accs || accs.length < 2) return;  // accounts not set up yet — skip silently

        const drAcc     = accs.find(a => a.name === drAccName);
        const crAcc     = accs.find(a => a.name === 'Professional Receipts');
        const debtorAcc = accs.find(a => a.name === 'Sundry Debtors');
        if (!drAcc || !crAcc) return;

        // 2. Financial year from date
        const d  = new Date(date);
        const yr = d.getMonth() >= 3 ? d.getFullYear() : d.getFullYear() - 1;
        const fy = `${yr}-${String(yr+1).slice(-2)}`;

        // 3. Auto-number the JE
        const { count } = await _supabase.from('journal_entries')
            .select('id', { count:'exact', head:true })
            .eq('financial_year', fy).eq('entry_type','Receipt');
        const jeNo = `RJV-${fy}-${String((count||0)+1).padStart(3,'0')}`;

        // 4. Create journal entry header
        const { data: prof } = await _supabase.auth.getUser();
        const { data: entry, error: jeErr } = await _supabase.from('journal_entries').insert({
            entry_no:      jeNo,
            entry_date:    date,
            entry_type:    'Receipt',
            narration:     `Being receipt no. ${no} received via ${mode}`,
            is_auto:       true,
            source_table:  'receipts',
            source_id:     receiptId,
            financial_year: fy,
            created_by:    prof?.user?.id
        }).select('id').single();
        if (jeErr) { console.warn('JE header error:', jeErr.message); return; }

        // 5. Build lines:
        // Dr: Cash/Bank A/c   (amount received increases asset)
        // Cr: Professional Receipts A/c (income recognised)
        // If invoice linked: also Dr Sundry Debtors offset (they were previously Dr'd when invoice raised)
        // Simple receipt model: Dr Cash/Bank | Cr Professional Receipts
        const lines = [
            { entry_id:entry.id, account_id:drAcc.id,  dr_amount:amount, cr_amount:0,
              receipt_id:receiptId, client_id:clientId  },
            { entry_id:entry.id, account_id:crAcc.id,  dr_amount:0, cr_amount:amount,
              receipt_id:receiptId, invoice_id:invoiceId }
        ];

        const { error: lErr } = await _supabase.from('journal_lines').insert(lines);
        if (lErr) console.warn('JE lines error:', lErr.message);

    } catch(e) {
        console.warn('Auto JE failed (non-critical):', e.message);
        // Non-critical: receipt is already saved, JE failure should not block the user
    }
}
