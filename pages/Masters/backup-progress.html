<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>System Data Backup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f172a;
    --surface:   #1e293b;
    --border:    #334155;
    --muted:     #475569;
    --text:      #e2e8f0;
    --subtext:   #94a3b8;
    --accent:    #f59e0b;
    --accent2:   #3b82f6;
    --success:   #10b981;
    --danger:    #ef4444;
    --warn:      #f97316;
    --radius:    10px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    user-select: none;
    overflow: hidden;
  }

  /* ── Layout ── */
  .shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 20px 20px 16px;
    gap: 14px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: linear-gradient(135deg, #b45309, #f59e0b);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .header-title { font-size: 16px; font-weight: 700; color: var(--text); }
  .header-sub   { font-size: 11px; color: var(--subtext); margin-top: 2px; }
  .header-badge {
    margin-left: auto;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px; font-weight: 600;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--subtext);
    transition: all .3s;
  }
  .header-badge.running  { background: rgba(245,158,11,.12); border-color: #f59e0b44; color: var(--accent); }
  .header-badge.success  { background: rgba(16,185,129,.12); border-color: #10b98144; color: var(--success); }
  .header-badge.error    { background: rgba(239,68,68,.12);  border-color: #ef444444; color: var(--danger); }
  .header-badge.warnings { background: rgba(249,115,22,.12); border-color: #f9731644; color: var(--warn); }

  /* ── Overall progress bar ── */
  .overall-bar-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .overall-label {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--subtext); margin-bottom: 8px;
  }
  .overall-label span:first-child { font-weight: 600; color: var(--text); }
  .bar-outer {
    height: 6px; border-radius: 3px;
    background: var(--border); overflow: hidden;
  }
  .bar-inner {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, #b45309, #f59e0b);
    width: 0%;
    transition: width .4s ease;
  }
  .bar-inner.done   { background: linear-gradient(90deg, #059669, #10b981); }
  .bar-inner.error  { background: linear-gradient(90deg, #b91c1c, #ef4444); }

  /* ── Step list ── */
  .steps {
    display: flex; gap: 6px;
  }
  .step {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 10px 8px;
    transition: border-color .3s, background .3s;
    min-width: 0;
  }
  .step.active  { border-color: #f59e0b66; background: rgba(245,158,11,.06); }
  .step.done    { border-color: #10b98144; background: rgba(16,185,129,.05); }
  .step.error   { border-color: #ef444444; background: rgba(239,68,68,.05); }

  .step-num {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--border); color: var(--muted);
    font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 6px; transition: all .3s;
  }
  .step.active .step-num { background: var(--accent); color: #0f172a; }
  .step.done   .step-num { background: var(--success); color: #0f172a; }
  .step.error  .step-num { background: var(--danger);  color: #fff; }

  .step-name  { font-size: 10px; color: var(--subtext); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .step-pct   { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .step.active .step-name { color: var(--accent); }
  .step.done   .step-name { color: var(--success); }

  .step-mini-bar { height: 3px; border-radius: 2px; background: var(--border); margin-top: 6px; overflow: hidden; }
  .step-mini-fill { height: 100%; border-radius: 2px; background: var(--muted); width: 0%; transition: width .4s; }
  .step.active .step-mini-fill { background: var(--accent); }
  .step.done   .step-mini-fill { background: var(--success); width: 100% !important; }
  .step.error  .step-mini-fill { background: var(--danger);  }

  /* ── Log terminal ── */
  .log-wrap {
    flex: 1;
    background: #060d1a;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex; flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  .log-header {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    background: var(--surface);
  }
  .log-dot { width: 8px; height: 8px; border-radius: 50%; }
  .log-title { font-size: 11px; color: var(--subtext); font-weight: 600; letter-spacing: .5px; flex: 1; }
  .log-speed { font-size: 11px; color: var(--accent); font-family: 'Consolas', monospace; min-width: 90px; text-align: right; }

  .log-body {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 12px;
    line-height: 1.7;
    scroll-behavior: smooth;
  }
  .log-body::-webkit-scrollbar       { width: 4px; }
  .log-body::-webkit-scrollbar-track { background: transparent; }
  .log-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-line       { color: #94a3b8; }
  .log-line.info  { color: #7dd3fc; }
  .log-line.ok    { color: #6ee7b7; }
  .log-line.warn  { color: #fcd34d; }
  .log-line.err   { color: #fca5a5; }
  .log-line.dim   { color: #475569; }
  .log-ts         { color: #334155; margin-right: 8px; font-size: 10px; }
  .log-icon       { margin-right: 4px; }

  /* ── Cleanup prompt ── */
  .cleanup-panel {
    background: var(--surface);
    border: 1px solid #f59e0b44;
    border-radius: var(--radius);
    padding: 14px 16px;
    display: none;
    animation: fadeIn .3s;
  }
  .cleanup-panel.visible { display: block; }
  .cleanup-title {
    font-size: 12px; font-weight: 700; color: var(--accent);
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .cleanup-list {
    background: #060d1a; border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 10px; margin-bottom: 10px;
    max-height: 80px; overflow-y: auto;
    font-family: 'Consolas', monospace; font-size: 11px; color: var(--subtext);
    line-height: 1.8;
  }
  .cleanup-btns { display: flex; gap: 8px; }
  .btn {
    padding: 7px 16px; border-radius: 7px; border: none;
    font-size: 12px; font-weight: 600; cursor: pointer;
    transition: opacity .2s;
  }
  .btn:hover { opacity: .85; }
  .btn-delete { background: linear-gradient(135deg,#b91c1c,#ef4444); color: #fff; }
  .btn-keep   { background: var(--border); color: var(--text); }

  /* ── Footer ── */
  .footer {
    display: flex; align-items: center; gap: 10px;
  }
  .elapsed { font-size: 11px; color: var(--muted); flex: 1; font-family: 'Consolas', monospace; }
  .btn-cancel {
    padding: 7px 18px; border-radius: 7px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--subtext); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all .2s;
  }
  .btn-cancel:hover { border-color: var(--danger); color: var(--danger); }
  .btn-cancel:disabled { opacity: .4; cursor: default; }
  .btn-start {
    padding: 7px 20px; border-radius: 7px; border: none;
    background: linear-gradient(135deg, #b45309, #f59e0b);
    color: #0f172a; font-size: 12px; font-weight: 700;
    cursor: pointer; transition: opacity .2s;
  }
  .btn-start:hover    { opacity: .9; }
  .btn-start:disabled { opacity: .4; cursor: default; }
  .btn-close {
    padding: 7px 20px; border-radius: 7px; border: none;
    background: linear-gradient(135deg, #059669, #10b981);
    color: #fff; font-size: 12px; font-weight: 700;
    cursor: pointer; display: none;
  }

  /* ── Spinner ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { display: inline-block; animation: spin .8s linear infinite; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }

  /* ── Pulse dot (running indicator) ── */
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }
  .pulse-dot { animation: pulse 1.4s ease-in-out infinite; }
</style>
</head>
<body>

<div class="shell">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">🗄️</div>
    <div>
      <div class="header-title">System Data Backup</div>
      <div class="header-sub" id="headerSub">Ready to start backup</div>
    </div>
    <div class="header-badge" id="statusBadge">Idle</div>
  </div>

  <!-- Overall progress bar -->
  <div class="overall-bar-wrap">
    <div class="overall-label">
      <span id="overallLabel">Overall Progress</span>
      <span id="overallPct">0%</span>
    </div>
    <div class="bar-outer">
      <div class="bar-inner" id="overallBar"></div>
    </div>
  </div>

  <!-- Step indicators -->
  <div class="steps" id="stepsRow">
    <div class="step" id="step1">
      <div class="step-num">1</div>
      <div class="step-name">Copy Folders</div>
      <div class="step-pct" id="s1pct">—</div>
      <div class="step-mini-bar"><div class="step-mini-fill" id="s1bar"></div></div>
    </div>
    <div class="step" id="step2">
      <div class="step-num">2</div>
      <div class="step-name">Create ZIP</div>
      <div class="step-pct" id="s2pct">—</div>
      <div class="step-mini-bar"><div class="step-mini-fill" id="s2bar"></div></div>
    </div>
    <div class="step" id="step3">
      <div class="step-num">3</div>
      <div class="step-name">Destination</div>
      <div class="step-pct" id="s3pct">—</div>
      <div class="step-mini-bar"><div class="step-mini-fill" id="s3bar"></div></div>
    </div>
    <div class="step" id="step4">
      <div class="step-num">4</div>
      <div class="step-name">Copy ZIP</div>
      <div class="step-pct" id="s4pct">—</div>
      <div class="step-mini-bar"><div class="step-mini-fill" id="s4bar"></div></div>
    </div>
    <div class="step" id="step5">
      <div class="step-num">5</div>
      <div class="step-name">Cleanup</div>
      <div class="step-pct" id="s5pct">—</div>
      <div class="step-mini-bar"><div class="step-mini-fill" id="s5bar"></div></div>
    </div>
  </div>

  <!-- Cleanup prompt (shown when PS requests user input) -->
  <div class="cleanup-panel" id="cleanupPanel">
    <div class="cleanup-title">⚠️ Old Backups Found</div>
    <div class="cleanup-list" id="cleanupList"></div>
    <div class="cleanup-btns">
      <button class="btn btn-delete" onclick="sendCleanup('1')">🗑 Delete All Old Backups</button>
      <button class="btn btn-keep"   onclick="sendCleanup('2')">📦 Keep All</button>
    </div>
  </div>

  <!-- Log terminal -->
  <div class="log-wrap">
    <div class="log-header">
      <div class="log-dot pulse-dot" id="logDot" style="background:#334155"></div>
      <div class="log-title">OUTPUT LOG</div>
      <div class="log-speed" id="speedDisp"></div>
    </div>
    <div class="log-body" id="logBody">
      <div class="log-line dim">— Waiting for backup to start —</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="elapsed" id="elapsed"></div>
    <button class="btn-cancel" id="btnCancel" onclick="doCancel()" disabled>Cancel</button>
    <button class="btn-start"  id="btnStart"  onclick="doStart()">▶ Start Backup</button>
    <button class="btn-close"  id="btnClose"  onclick="window.close()">✓ Close</button>
  </div>

</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let running      = false;
let startTime    = null;
let elapsedTimer = null;
let currentStep  = 0;

const STEP_WEIGHT = [20, 35, 5, 35, 5]; // % each step contributes to overall

// ── DOM refs ─────────────────────────────────────────────────────────────────
const logBody     = document.getElementById('logBody');
const overallBar  = document.getElementById('overallBar');
const overallPct  = document.getElementById('overallPct');
const overallLbl  = document.getElementById('overallLabel');
const statusBadge = document.getElementById('statusBadge');
const headerSub   = document.getElementById('headerSub');
const logDot      = document.getElementById('logDot');
const speedDisp   = document.getElementById('speedDisp');
const cleanupPanel= document.getElementById('cleanupPanel');
const elapsedEl   = document.getElementById('elapsed');

// ── Start ─────────────────────────────────────────────────────────────────────
async function doStart() {
  document.getElementById('btnStart').disabled  = true;
  document.getElementById('btnCancel').disabled = false;
  document.getElementById('btnStart').style.display  = 'none';

  running   = true;
  startTime = Date.now();
  clearLog();
  startElapsedTimer();

  setBadge('running', '⟳ Running');
  logDot.style.background = '#f59e0b';
  headerSub.textContent   = 'Backup in progress…';

  const res = await window.backupAPI.start();
  if (res?.error) {
    appendLog('err', '✗ ' + res.error);
    finishUI(false);
  }
}

// ── Cancel ────────────────────────────────────────────────────────────────────
async function doCancel() {
  await window.backupAPI.cancel();
  appendLog('warn', '⚠ Backup cancelled by user');
  finishUI(false, true);
}

// ── Cleanup choice ────────────────────────────────────────────────────────────
async function sendCleanup(choice) {
  cleanupPanel.classList.remove('visible');
  const label = choice === '1' ? 'Delete all old backups' : 'Keep all old backups';
  appendLog('info', `→ Choice: ${label}`);
  await window.backupAPI.cleanupChoice(choice);
}

// ── Line parser ───────────────────────────────────────────────────────────────
window.backupAPI.onLine((raw) => {
  const line = raw.trim();
  if (!line) return;

  if (line.startsWith('[STAGE]')) {
    // [STAGE] stepNum|totalSteps|Label
    const parts = line.replace('[STAGE] ', '').split('|');
    const n = parseInt(parts[0]);
    activateStep(n, parts[2] || '');
    currentStep = n;

  } else if (line.startsWith('[PROGRESS]')) {
    // [PROGRESS] stepNum|pct|speed
    const parts = line.replace('[PROGRESS] ', '').split('|');
    const n     = parseInt(parts[0]);
    const pct   = parseInt(parts[1]) || 0;
    const speed = parts[2]?.trim() || '';
    updateStepProgress(n, pct);
    updateOverall(n, pct);
    if (speed) speedDisp.textContent = speed;

  } else if (line.startsWith('[LOG]')) {
    const msg = line.replace('[LOG] ', '');
    const cls = msg.startsWith('ERROR') || msg.startsWith('✗') ? 'err'
              : msg.startsWith('⚠')   ? 'warn'
              : msg.startsWith('✓')   ? 'ok'
              : 'info';
    appendLog(cls, msg);

  } else if (line.startsWith('[INPUT]')) {
    // [INPUT] CLEANUP|count|file1|date1|size1;file2|...
    const payload = line.replace('[INPUT] ', '');
    if (payload.startsWith('CLEANUP')) {
      showCleanupPrompt(payload);
    }

  } else if (line.startsWith('[DONE]')) {
    const payload = line.replace('[DONE] ', '');
    handleDone(payload);

  } else if (line.startsWith('[ERROR]')) {
    const msg = line.replace('[ERROR] ', '');
    appendLog('err', '✗ ' + msg);
    markStepError(currentStep);
    finishUI(false);

  } else {
    // plain output
    appendLog('', line);
  }
});

window.backupAPI.onClosed((code) => {
  if (running) {
    if (code !== 0) {
      finishUI(false);
    }
  }
  running = false;
});

// ── Done handler ──────────────────────────────────────────────────────────────
function handleDone(payload) {
  const parts = payload.split('|');
  const status = parts[0];

  if (status === 'SUCCESS') {
    const loc  = parts[1] || '';
    const file = parts[2] || '';
    appendLog('ok', `✓ Backup complete!`);
    if (loc)  appendLog('ok', `  Location: ${loc}`);
    if (file) appendLog('ok', `  File: ${file}`);
    // Complete all steps
    for (let i = 1; i <= 5; i++) { markStepDone(i); }
    setOverallDone();
    finishUI(true);
  } else if (status === 'WARNINGS') {
    appendLog('warn', `⚠ Completed with warnings: ${parts.slice(1).join(' ')}`);
    setOverallDone();
    finishUI(true, false, true);
  }
}

// ── Cleanup prompt ────────────────────────────────────────────────────────────
function showCleanupPrompt(payload) {
  // CLEANUP|count|name|date|sizeMB;name|date|sizeMB;...
  const parts = payload.split('|');
  const count = parts[1];
  const files = parts.slice(2).join('|').split(';');

  appendLog('warn', `⚠ Found ${count} old backup(s) (older than 6 months)`);

  const list = document.getElementById('cleanupList');
  list.innerHTML = files.map(f => {
    const [name, date, size] = f.split('|');
    return `<div>${name || f} &nbsp;·&nbsp; ${date || ''} &nbsp;·&nbsp; ${size || ''}MB</div>`;
  }).join('');

  cleanupPanel.classList.add('visible');
}

// ── Step helpers ──────────────────────────────────────────────────────────────
function activateStep(n, label) {
  // Mark previous as done
  if (n > 1) markStepDone(n - 1);

  const el = document.getElementById(`step${n}`);
  if (!el) return;
  el.className = 'step active';
  overallLbl.textContent = `Step ${n}/5 — ${label}`;
}

function updateStepProgress(n, pct) {
  const bar = document.getElementById(`s${n}bar`);
  const txt = document.getElementById(`s${n}pct`);
  if (bar) bar.style.width = pct + '%';
  if (txt) txt.textContent = pct + '%';
}

function markStepDone(n) {
  const el = document.getElementById(`step${n}`);
  if (el) el.className = 'step done';
  updateStepProgress(n, 100);
}

function markStepError(n) {
  const el = document.getElementById(`step${n}`);
  if (el) el.className = 'step error';
}

// ── Overall progress ──────────────────────────────────────────────────────────
function updateOverall(stepN, stepPct) {
  let total = 0;
  for (let i = 0; i < stepN - 1; i++) total += STEP_WEIGHT[i];
  total += (STEP_WEIGHT[stepN - 1] * stepPct) / 100;
  const pct = Math.min(99, Math.round(total));
  overallBar.style.width = pct + '%';
  overallPct.textContent = pct + '%';
}

function setOverallDone() {
  overallBar.style.width = '100%';
  overallPct.textContent = '100%';
  overallBar.classList.add('done');
  overallLbl.textContent = 'All steps complete';
}

// ── Log helpers ───────────────────────────────────────────────────────────────
function appendLog(cls, msg) {
  const now = new Date();
  const ts  = now.toTimeString().slice(0,8);
  const div = document.createElement('div');
  div.className = 'log-line ' + (cls || '');
  div.innerHTML = `<span class="log-ts">${ts}</span>${msg}`;
  logBody.appendChild(div);
  logBody.scrollTop = logBody.scrollHeight;
}

function clearLog() {
  logBody.innerHTML = '';
  appendLog('dim', '— Backup started —');
}

// ── Finish ────────────────────────────────────────────────────────────────────
function finishUI(success, cancelled = false, warnings = false) {
  running = false;
  stopElapsedTimer();
  speedDisp.textContent = '';
  logDot.style.background = success ? '#10b981' : cancelled ? '#475569' : '#ef4444';
  logDot.style.animation  = 'none';

  document.getElementById('btnCancel').disabled = true;
  document.getElementById('btnClose').style.display = 'inline-block';

  if (success && !warnings) {
    setBadge('success', '✓ Success');
    headerSub.textContent = 'Backup completed successfully';
    overallBar.classList.add('done');
  } else if (warnings) {
    setBadge('warnings', '⚠ Warnings');
    headerSub.textContent = 'Completed with warnings';
  } else if (cancelled) {
    setBadge('', 'Cancelled');
    headerSub.textContent = 'Backup was cancelled';
  } else {
    setBadge('error', '✗ Failed');
    headerSub.textContent = 'Backup failed — check log';
    overallBar.classList.add('error');
  }
}

// ── Badge ─────────────────────────────────────────────────────────────────────
function setBadge(cls, text) {
  statusBadge.className = 'header-badge ' + cls;
  statusBadge.textContent = text;
}

// ── Elapsed timer ─────────────────────────────────────────────────────────────
function startElapsedTimer() {
  elapsedTimer = setInterval(() => {
    if (!startTime) return;
    const sec  = Math.floor((Date.now() - startTime) / 1000);
    const m    = Math.floor(sec / 60).toString().padStart(2, '0');
    const s    = (sec % 60).toString().padStart(2, '0');
    elapsedEl.textContent = `Elapsed: ${m}:${s}`;
  }, 1000);
}
function stopElapsedTimer() {
  if (elapsedTimer) { clearInterval(elapsedTimer); elapsedTimer = null; }
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('unload', () => {
  window.backupAPI.removeAllListeners();
});
</script>
</body>
</html>
