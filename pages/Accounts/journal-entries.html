<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GSTaxOfy — Journal Entries</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="../../css/style.css">
<link rel="manifest" href="../../manifest.json">
<meta name="theme-color" content="#2563eb">
<style>
.je-card      { background:#fff;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:8px;overflow:hidden }
.je-header    { display:flex;align-items:center;gap:12px;padding:11px 16px;cursor:pointer;user-select:none }
.je-header:hover { background:#f8fafc }
.je-no        { font-weight:700;color:#2563eb;font-size:13px;min-width:120px }
.je-date      { font-size:12px;color:#6b7280;min-width:90px }
.je-narr      { flex:1;font-size:12px;color:#374151;font-style:italic }
.je-badge     { font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap }
.badge-sales  { background:#dbeafe;color:#1e40af }
.badge-rcpt   { background:#dcfce7;color:#166534 }
.badge-jv     { background:#f3f4f6;color:#374151 }
.badge-pay    { background:#fef3c7;color:#92400e }
.badge-auto   { background:#ede9fe;color:#5b21b6;margin-left:4px }
.je-amt       { font-size:13px;font-weight:700;color:#1f2937;min-width:80px;text-align:right }
.je-lines     { display:none;border-top:1px solid #f3f4f6 }
.je-lines.open{ display:block }
.je-line-hdr  { display:grid;grid-template-columns:2fr 1fr 1fr;padding:6px 16px;font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;background:#fafafa;border-bottom:1px solid #f3f4f6 }
.je-line-row  { display:grid;grid-template-columns:2fr 1fr 1fr;padding:8px 16px;font-size:12px;border-bottom:1px solid #f9fafb }
.je-line-acc  { color:#374151 }
.je-dr        { color:#2563eb;font-weight:600;text-align:right }
.je-cr        { color:#059669;font-weight:600;text-align:right }
.je-line-tot  { display:grid;grid-template-columns:2fr 1fr 1fr;padding:7px 16px;font-size:12px;font-weight:700;background:#f8fafc;border-top:1px solid #e5e7eb }
.filter-row   { display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center }
.filter-row select, .filter-row input { padding:7px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;background:#fff }
.kpi-strip    { display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px }
.kpi-box      { background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:12px 14px }
.kpi-label    { font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;font-weight:600 }
.kpi-val      { font-size:20px;font-weight:800;color:#1f2937;margin-top:2px }
.period-note  { font-size:12px;color:#6b7280;font-style:italic;margin-bottom:10px }
/* Modal line builder */
.je-line-builder { display:grid;grid-template-columns:2fr 1fr 1fr 32px;gap:6px;margin-bottom:6px;align-items:center }
</style>
</head>
<body>
<div class="app-container">
    <header class="header">
        <div class="logo-section">
            <div class="ca-logo"><img src="../../assets/logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="ca-logo-text" style="display:none">CA</span></div>
            <div class="company-info"><h1 id="firmNameHeader">GSTaxOfy</h1><p>GSTaxOfy</p></div>
        </div>
        <div class="user-info" onclick="toggleUserDropdown()">
            <div class="user-avatar" id="headerAvatar">G</div>
            <div class="user-details"><div class="user-name" id="headerUserName">Loading…</div><div class="user-role" id="headerUserRole"></div></div>
            <i class="fas fa-chevron-down" style="color:#6b7280;font-size:12px;margin-left:4px"></i>
            <div class="user-dropdown" id="userDropdown">
                <div class="user-dropdown-item" onclick="window.location.href=ROUTES.changePassword()"><i class="fas fa-key"></i> Change Password</div>
                <div class="user-dropdown-item danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</div>
            </div>
        </div>
    </header>
    <div class="main-content">
        <aside class="sidebar" id="sidebar-placeholder"></aside>
        <main class="content-area">
            <div class="section-header">
                <div class="page-title" style="margin:0"><i class="fas fa-book-open"></i> Journal Entries</div>
                <div style="display:flex;gap:8px">
                    <button class="btn btn-secondary btn-sm" onclick="window.print()"><i class="fas fa-print"></i> Print</button>
                    <button class="btn btn-primary btn-sm" onclick="openAddJEModal()"><i class="fas fa-plus"></i> New Entry</button>
                </div>
            </div>

            <div class="filter-row">
                <select id="filterFY" onchange="onFYChange()"></select>
                <select id="filterType" onchange="renderEntries()">
                    <option value="">All Types</option>
                    <option value="Journal">Journal</option>
                    <option value="Sales">Sales (Invoices)</option>
                    <option value="Receipt">Receipt</option>
                    <option value="Payment">Payment</option>
                    <option value="Contra">Contra</option>
                </select>
                <input type="text" id="searchJE" placeholder="Search narration / entry no…" oninput="renderEntries()" style="flex:1;min-width:180px">
            </div>
            <div id="periodNote" class="period-note"></div>

            <div class="kpi-strip">
                <div class="kpi-box"><div class="kpi-label">Total Entries</div><div class="kpi-val" id="sumCount">0</div></div>
                <div class="kpi-box"><div class="kpi-label">Total Dr</div><div class="kpi-val" style="color:#2563eb" id="sumDr">₹ 0</div></div>
                <div class="kpi-box"><div class="kpi-label">Total Cr</div><div class="kpi-val" style="color:#059669" id="sumCr">₹ 0</div></div>
            </div>

            <div id="jeContainer"></div>
        </main>
    </div>
</div>

<!-- Logout Modal -->
<div class="modal-overlay" id="logoutModal">
    <div class="modal-box" style="max-width:340px">
        <div class="modal-header"><span class="modal-title">Confirm Logout</span><button class="modal-close" onclick="closeModal('logoutModal')">&times;</button></div>
        <p style="color:#6b7280;margin-bottom:20px;text-align:center">Are you sure you want to logout?</p>
        <div style="display:flex;gap:10px;justify-content:center">
            <button class="btn btn-secondary" onclick="closeModal('logoutModal')">Cancel</button>
            <button class="btn btn-danger" onclick="confirmLogout()">Yes, Logout</button>
        </div>
    </div>
</div>

<!-- New JE Modal -->
<div class="modal-overlay" id="jeModal">
    <div class="modal-box" style="max-width:640px">
        <div class="modal-header">
            <span class="modal-title"><i class="fas fa-book-open" style="color:#2563eb;margin-right:8px"></i>New Journal Entry</span>
            <button class="modal-close" onclick="closeModal('jeModal')">&times;</button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px">
            <div class="form-group"><label>Entry No. *</label><input type="text" id="je_no" class="form-control" placeholder="JV-2026-27-001"></div>
            <div class="form-group"><label>Date *</label><input type="date" id="je_date" class="form-control"></div>
            <div class="form-group"><label>Type</label>
                <select id="je_type" class="form-control">
                    <option value="Journal">Journal</option>
                    <option value="Payment">Payment</option>
                    <option value="Contra">Contra</option>
                </select>
            </div>
        </div>
        <div class="form-group" style="margin-bottom:14px">
            <label>Narration</label>
            <input type="text" id="je_narration" class="form-control" placeholder="Being…">
        </div>
        <div style="display:grid;grid-template-columns:2fr 1fr 1fr 32px;gap:6px;margin-bottom:4px;font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;padding:0 2px">
            <span>Account</span><span style="text-align:right">Dr Amount</span><span style="text-align:right">Cr Amount</span><span></span>
        </div>
        <div id="jeLines"></div>
        <button onclick="addJELine()" style="border:1.5px dashed #d1d5db;background:#f9fafb;color:#6b7280;border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;width:100%;margin:6px 0">
            <i class="fas fa-plus"></i> Add Line
        </button>
        <div style="display:grid;grid-template-columns:2fr 1fr 1fr 32px;gap:6px;background:#f8fafc;border-radius:8px;padding:9px 12px;font-size:13px;font-weight:700;margin-bottom:10px">
            <span style="color:#6b7280">Totals</span>
            <span id="je_total_dr" style="text-align:right;color:#2563eb">₹ 0.00</span>
            <span id="je_total_cr" style="text-align:right;color:#059669">₹ 0.00</span>
            <span></span>
        </div>
        <div id="je_balance_warn" style="display:none;background:#fee2e2;color:#991b1b;border-radius:8px;padding:8px 12px;font-size:12px;margin-bottom:10px">
            <i class="fas fa-exclamation-triangle"></i> Debit and Credit totals must be equal.
        </div>
        <div class="form-actions">
            <button class="btn btn-secondary" onclick="closeModal('jeModal')">Cancel</button>
            <button class="btn btn-primary" onclick="saveJournalEntry()"><i class="fas fa-save"></i> Save Entry</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../js/supabase-config.js"></script>
<script src="../../js/app.js"></script>
<script src="../../js/sidebar.js"></script>
<script src="../../js/layout.js"></script>
<script>
let allEntries = [], allAccounts = [];

function buildFYOptions(selectId) {
    const sel = document.getElementById(selectId);
    sel.innerHTML = '';
    const now = new Date();
    const curStart = now.getMonth() >= 3 ? now.getFullYear() : now.getFullYear() - 1;
    const curFY = `${curStart}-${String(curStart+1).slice(-2)}`;
    for (let y = 2022; y <= 2027; y++) {
        const fy = `${y}-${String(y+1).slice(-2)}`;
        sel.innerHTML += `<option value="${fy}" ${fy===curFY?'selected':''}>${fy}</option>`;
    }
}
function fyToPeriod(fy) {
    const sy = parseInt(fy.split('-')[0]), ey = sy+1;
    const s2 = String(sy).slice(-2), e2 = String(ey).slice(-2);
    return `1-Apr-${s2} to 31-Mar-${e2}`;
}
function fmt(n) { return '₹ ' + Math.abs(n).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}); }

(async () => {
    const profile = await initLayout();
    if (!profile) return;
    renderSidebar('journal-entries');
    setActiveNav();
    buildFYOptions('filterFY');
    updatePeriodNote();
    await Promise.all([loadAccounts(), loadEntries()]);
})();

function updatePeriodNote() {
    const fy = document.getElementById('filterFY').value;
    document.getElementById('periodNote').textContent = `Period: ${fyToPeriod(fy)}`;
}
function onFYChange() { updatePeriodNote(); loadEntries(); }

async function loadAccounts() {
    const { data } = await _supabase.from('accounts').select('id,name,group_name').eq('is_active',true).order('name');
    allAccounts = data || [];
}

async function loadEntries() {
    const fy   = document.getElementById('filterFY').value;
    const type = document.getElementById('filterType').value;
    let q = _supabase.from('journal_entries').select('*, journal_lines(*, accounts(name,group_name))')
        .eq('financial_year', fy).order('entry_date',{ascending:false}).order('id',{ascending:false});
    if (type) q = q.eq('entry_type', type);
    const { data, error } = await q;
    if (error) { showToast(error.message,'error'); return; }
    allEntries = data || [];
    renderEntries();
}

function renderEntries() {
    const search = document.getElementById('searchJE').value.toLowerCase();
    const filtered = search
        ? allEntries.filter(e => (e.narration||'').toLowerCase().includes(search) || e.entry_no.toLowerCase().includes(search))
        : allEntries;

    let tDr=0, tCr=0;
    filtered.forEach(e => (e.journal_lines||[]).forEach(l => { tDr+=parseFloat(l.dr_amount||0); tCr+=parseFloat(l.cr_amount||0); }));
    document.getElementById('sumCount').textContent = filtered.length;
    document.getElementById('sumDr').textContent    = fmt(tDr);
    document.getElementById('sumCr').textContent    = fmt(tCr);

    if (!filtered.length) {
        document.getElementById('jeContainer').innerHTML = `<div class="empty-state"><i class="fas fa-book-open" style="font-size:40px;color:#e5e7eb;margin-bottom:12px"></i><p>No journal entries found for this period.</p></div>`;
        return;
    }

    const badgeClass = { Sales:'badge-sales', Receipt:'badge-rcpt', Journal:'badge-jv', Payment:'badge-pay', Contra:'badge-jv' };
    document.getElementById('jeContainer').innerHTML = filtered.map(e => {
        const lines  = e.journal_lines || [];
        const eDr    = lines.reduce((s,l)=>s+parseFloat(l.dr_amount||0),0);
        const eCr    = lines.reduce((s,l)=>s+parseFloat(l.cr_amount||0),0);
        const dStr   = new Date(e.entry_date).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
        return `<div class="je-card">
            <div class="je-header" onclick="toggleJE(${e.id})">
                <i class="fas fa-chevron-right" id="chv-${e.id}" style="font-size:10px;color:#9ca3af;transition:transform .15s"></i>
                <span class="je-no">${e.entry_no}</span>
                <span class="je-date">${dStr}</span>
                <span class="je-narr">${e.narration||''}</span>
                <span class="je-badge ${badgeClass[e.entry_type]||'badge-jv'}">${e.entry_type}</span>
                ${e.is_auto ? `<span class="je-badge badge-auto"><i class="fas fa-robot"></i> Auto</span>` : ''}
                <span class="je-amt">${fmt(eDr)}</span>
                ${!e.is_auto ? `<button class="btn btn-danger btn-sm" style="padding:3px 7px;margin-left:6px" onclick="event.stopPropagation();deleteJE(${e.id})"><i class="fas fa-trash"></i></button>` : ''}
            </div>
            <div class="je-lines" id="jel-${e.id}">
                <div class="je-line-hdr"><span>Account</span><span style="text-align:right">Dr (₹)</span><span style="text-align:right">Cr (₹)</span></div>
                ${lines.map(l=>`<div class="je-line-row">
                    <span class="je-line-acc">${l.accounts?.name||'—'} <span style="font-size:10px;color:#9ca3af">(${l.accounts?.group_name||''})</span></span>
                    <span class="je-dr">${parseFloat(l.dr_amount||0)>0?fmt(l.dr_amount):''}</span>
                    <span class="je-cr">${parseFloat(l.cr_amount||0)>0?fmt(l.cr_amount):''}</span>
                </div>`).join('')}
                <div class="je-line-tot">
                    <span style="color:#6b7280">Total</span>
                    <span style="color:#2563eb;text-align:right">${fmt(eDr)}</span>
                    <span style="color:#059669;text-align:right">${fmt(eCr)}</span>
                </div>
            </div>
        </div>`;
    }).join('');
}

function toggleJE(id) {
    const el  = document.getElementById('jel-'+id);
    const chv = document.getElementById('chv-'+id);
    const open = el.classList.toggle('open');
    chv.style.transform = open ? 'rotate(90deg)' : '';
}

// ── Add JE ────────────────────────────────────────────────────
let jeLineCount = 0;

function openAddJEModal() {
    document.getElementById('je_no').value = '';
    document.getElementById('je_date').value = new Date().toISOString().split('T')[0];
    document.getElementById('je_type').value = 'Journal';
    document.getElementById('je_narration').value = '';
    document.getElementById('jeLines').innerHTML = '';
    document.getElementById('je_balance_warn').style.display = 'none';
    jeLineCount = 0;
    addJELine(); addJELine();
    updateJETotals();
    autoNumberJE();
    openModal('jeModal');
}

async function autoNumberJE() {
    const fy = document.getElementById('filterFY').value;
    const { count } = await _supabase.from('journal_entries')
        .select('id',{count:'exact',head:true}).eq('financial_year',fy).eq('entry_type','Journal');
    document.getElementById('je_no').value = `JV-${fy}-${String((count||0)+1).padStart(3,'0')}`;
}

function buildAccOptions(selId) {
    return allAccounts.map(a=>`<option value="${a.id}">${a.name} (${a.group_name})</option>`).join('');
}

function addJELine() {
    jeLineCount++;
    const id = jeLineCount;
    const row = document.createElement('div');
    row.className = 'je-line-builder';
    row.id = 'jl-'+id;
    row.innerHTML = `
        <select class="form-control" id="jla_${id}" style="font-size:12px" onchange="updateJETotals()">
            <option value="">— Account —</option>${buildAccOptions()}
        </select>
        <input type="number" class="form-control" id="jld_${id}" placeholder="0.00" min="0" step="0.01"
            style="text-align:right;font-size:12px" oninput="updateJETotals()">
        <input type="number" class="form-control" id="jlc_${id}" placeholder="0.00" min="0" step="0.01"
            style="text-align:right;font-size:12px" oninput="updateJETotals()">
        <button onclick="document.getElementById('jl-${id}').remove();updateJETotals()"
            style="background:#fee2e2;border:none;border-radius:6px;width:30px;height:30px;color:#dc2626;cursor:pointer">
            <i class="fas fa-times"></i></button>`;
    document.getElementById('jeLines').appendChild(row);
}

function updateJETotals() {
    let dr=0,cr=0;
    document.querySelectorAll('#jeLines .je-line-builder').forEach(row => {
        const id = row.id.replace('jl-','');
        dr += parseFloat(document.getElementById('jld_'+id)?.value||0);
        cr += parseFloat(document.getElementById('jlc_'+id)?.value||0);
    });
    document.getElementById('je_total_dr').textContent = fmt(dr);
    document.getElementById('je_total_cr').textContent = fmt(cr);
    document.getElementById('je_balance_warn').style.display =
        (Math.abs(dr-cr)>0.001 && (dr>0||cr>0)) ? '' : 'none';
}

async function saveJournalEntry() {
    const no   = document.getElementById('je_no').value.trim();
    const date = document.getElementById('je_date').value;
    const type = document.getElementById('je_type').value;
    const narr = document.getElementById('je_narration').value.trim();
    const fy   = document.getElementById('filterFY').value;
    if (!no||!date) { showToast('Entry No. and Date required.','error'); return; }

    const lines = [];
    document.querySelectorAll('#jeLines .je-line-builder').forEach(row => {
        const id = row.id.replace('jl-','');
        const acc = document.getElementById('jla_'+id)?.value;
        const dr  = parseFloat(document.getElementById('jld_'+id)?.value||0);
        const cr  = parseFloat(document.getElementById('jlc_'+id)?.value||0);
        if (acc && (dr>0||cr>0)) lines.push({account_id:parseInt(acc),dr_amount:dr,cr_amount:cr});
    });

    if (lines.length<2) { showToast('At least 2 lines required.','error'); return; }
    const tDr=lines.reduce((s,l)=>s+l.dr_amount,0), tCr=lines.reduce((s,l)=>s+l.cr_amount,0);
    if (Math.abs(tDr-tCr)>0.001) { showToast('Debit and Credit must be equal.','error'); return; }

    const { data:prof } = await _supabase.auth.getUser();
    const { data:entry, error } = await _supabase.from('journal_entries').insert({
        entry_no:no, entry_date:date, entry_type:type, narration:narr,
        financial_year:fy, is_auto:false, created_by:prof?.user?.id
    }).select('id').single();
    if (error) { showToast(error.message,'error'); return; }

    const { error:le } = await _supabase.from('journal_lines').insert(lines.map(l=>({...l,entry_id:entry.id})));
    if (le) { showToast(le.message,'error'); return; }

    showToast('Journal Entry saved.','success');
    closeModal('jeModal');
    await loadEntries();
}

async function deleteJE(id) {
    if (!confirm('Delete this journal entry permanently?')) return;
    await _supabase.from('journal_lines').delete().eq('entry_id',id);
    const { error } = await _supabase.from('journal_entries').delete().eq('id',id);
    if (error) { showToast(error.message,'error'); return; }
    showToast('Entry deleted.','success');
    await loadEntries();
}
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('../../sw.js').catch(()=>{});}</script>
</body>
</html>
