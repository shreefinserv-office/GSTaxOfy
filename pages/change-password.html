<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GStaxOfy — Change Password</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="GStaxOfy">
    <link rel="apple-touch-icon" href="../assets/icon-192.png">
</head>
<body>
<div class="app-container">
    <header class="header">
        <div class="logo-section">
            <div class="ca-logo"><img src="../assets/logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="ca-logo-text" style="display:none">CA</span></div>
            <div class="company-info">
                <h1 id="firmNameHeader">GStaxOfy</h1>
                <p>GSTaxOfy</p>
            </div>
        </div>
        <div class="user-info" onclick="toggleUserDropdown()">
            <div class="user-avatar" id="headerAvatar">G</div>
            <div class="user-details">
                <div class="user-name" id="headerUserName">Loading…</div>
                <div class="user-role" id="headerUserRole"></div>
            </div>
            <i class="fas fa-chevron-down" style="color:#6b7280;font-size:12px;margin-left:4px"></i>
            <div class="user-dropdown" id="userDropdown">
                <div class="user-dropdown-item" onclick="window.location.href=ROUTES.changePassword()"><i class="fas fa-key"></i> Change Password</div>
                <div class="user-dropdown-item danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</div>
            </div>
        </div>
    </header>
    <div class="main-content">
        <aside class="sidebar" id="sidebar-placeholder"></aside>
        <main class="content-area">
            <div class="page-title"><i class="fas fa-key"></i> Change Password</div>

            <div style="max-width:460px">
                <!-- Password reset via email token (when coming from email link) -->
                <div id="tokenMode" class="hidden">
                    <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:14px 18px;margin-bottom:20px;color:#1e40af;font-size:14px">
                        <i class="fas fa-info-circle" style="margin-right:6px"></i>
                        You arrived via a password reset link. Set your new password below.
                    </div>
                </div>

                <div class="form-group" id="currentPwdGroup">
                    <label>Current Password *</label>
                    <div style="position:relative">
                        <input type="password" id="currentPwd" placeholder="Enter current password" style="padding-right:42px">
                        <i class="fas fa-eye" id="toggleCurrent" onclick="togglePwd('currentPwd','toggleCurrent')"
                           style="position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:#9ca3af"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>New Password *</label>
                    <div style="position:relative">
                        <input type="password" id="newPwd" placeholder="Min 8 characters" style="padding-right:42px" oninput="checkStrength()">
                        <i class="fas fa-eye" id="toggleNew" onclick="togglePwd('newPwd','toggleNew')"
                           style="position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:#9ca3af"></i>
                    </div>
                    <!-- Strength bar -->
                    <div style="margin-top:8px">
                        <div style="height:5px;background:#e5e7eb;border-radius:3px;overflow:hidden">
                            <div id="strengthBar" style="height:100%;width:0;transition:all .3s;border-radius:3px"></div>
                        </div>
                        <span id="strengthLabel" style="font-size:11px;color:#9ca3af;margin-top:3px;display:block"></span>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom:24px">
                    <label>Confirm New Password *</label>
                    <div style="position:relative">
                        <input type="password" id="confirmPwd" placeholder="Re-enter new password" style="padding-right:42px">
                        <i class="fas fa-eye" id="toggleConfirm" onclick="togglePwd('confirmPwd','toggleConfirm')"
                           style="position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:#9ca3af"></i>
                    </div>
                </div>

                <div style="display:flex;gap:10px">
                    <button class="btn btn-secondary" onclick="window.history.back()"><i class="fas fa-arrow-left"></i> Back</button>
                    <button class="btn btn-primary" id="changePwdBtn" onclick="changePassword()"><i class="fas fa-key"></i> Change Password</button>
                </div>
            </div>
        </main>
    </div>
</div>

<div class="modal-overlay" id="logoutModal">
    <div class="modal-box" style="max-width:340px">
        <div class="modal-header"><span class="modal-title">Confirm Logout</span><button class="modal-close" onclick="closeModal('logoutModal')">&times;</button></div>
        <p style="color:#6b7280;margin-bottom:20px;text-align:center">Are you sure you want to logout?</p>
        <div style="display:flex;gap:10px;justify-content:center">
            <button class="btn btn-secondary" onclick="closeModal('logoutModal')">Cancel</button>
            <button class="btn btn-danger" onclick="confirmLogout()"><i class="fas fa-sign-out-alt"></i> Yes, Logout</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/layout.js"></script>
<script>
let isResetMode = false;

(async () => {
    // Check if coming from password reset email (hash contains access_token)
    const hash = window.location.hash;
    if (hash.includes('access_token')) {
        isResetMode = true;
        document.getElementById('tokenMode').classList.remove('hidden');
        document.getElementById('currentPwdGroup').classList.add('hidden');
        // Don't require auth guard — user came from email link
        hideLoader();
        return;
    }
    const profile = await initLayout();
    if (!profile) return;
    renderSidebar('change-password');
    setActiveNav();
    const { data: firm } = await _supabase.from('firm_details').select('firm_name').single();
    if (firm) document.getElementById('firmNameHeader').textContent = firm.firm_name;
})();

function togglePwd(inputId, iconId) {
    const inp  = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (inp.type === 'password') { inp.type='text'; icon.className='fas fa-eye-slash'; }
    else                         { inp.type='password'; icon.className='fas fa-eye'; }
    icon.style.cssText = 'position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:#9ca3af';
}

function checkStrength() {
    const pwd = document.getElementById('newPwd').value;
    const bar = document.getElementById('strengthBar');
    const lbl = document.getElementById('strengthLabel');
    let score = 0;
    if (pwd.length >= 8) score++;
    if (/[A-Z]/.test(pwd)) score++;
    if (/[0-9]/.test(pwd)) score++;
    if (/[^A-Za-z0-9]/.test(pwd)) score++;
    const map = [
        { w:'0%',   c:'#e5e7eb', t:'' },
        { w:'25%',  c:'#ef4444', t:'Weak' },
        { w:'50%',  c:'#f59e0b', t:'Fair' },
        { w:'75%',  c:'#3b82f6', t:'Good' },
        { w:'100%', c:'#10b981', t:'Strong' }
    ];
    bar.style.width = map[score].w;
    bar.style.background = map[score].c;
    lbl.textContent = map[score].t;
    lbl.style.color = map[score].c;
}

async function changePassword() {
    const newPwd     = document.getElementById('newPwd').value;
    const confirmPwd = document.getElementById('confirmPwd').value;
    if (newPwd !== confirmPwd) { showToast('Passwords do not match.', 'error'); return; }
    if (newPwd.length < 8)    { showToast('Password must be at least 8 characters.', 'error'); return; }

    const btn = document.getElementById('changePwdBtn');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating…';

    if (!isResetMode) {
        // Re-authenticate first with current password
        const currentPwd = document.getElementById('currentPwd').value;
        if (!currentPwd) { showToast('Enter your current password.', 'error'); btn.disabled=false; btn.innerHTML='<i class="fas fa-key"></i> Change Password'; return; }
        const { data: { user } } = await _supabase.auth.getUser();
        const { error: signInErr } = await _supabase.auth.signInWithPassword({
            email: user.email, password: currentPwd
        });
        if (signInErr) { showToast('Current password is incorrect.', 'error'); btn.disabled=false; btn.innerHTML='<i class="fas fa-key"></i> Change Password'; return; }
    }

    const { error } = await _supabase.auth.updateUser({ password: newPwd });
    btn.disabled = false; btn.innerHTML = '<i class="fas fa-key"></i> Change Password';
    if (error) { showToast(error.message, 'error'); return; }

    await logAudit('CHANGE_PASSWORD');
    showToast('Password changed successfully! Redirecting to login…', 'success');
    setTimeout(async () => {
        await _supabase.auth.signOut();
        window.location.href = ROUTES.login();
    }, 2000);
}
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('../sw.js').then(()=>console.log('[PWA] SW registered')).catch(e=>console.warn('[PWA] SW failed:',e));}</script>
</body>
</html>
