<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GStaxOfy — Work Log</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="manifest" href="../../manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="GStaxOfy">
    <link rel="apple-touch-icon" href="../../assets/icon-192.png">
    <style>
        .status-badge { display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600 }
        .status-pending    { background:#fef9c3;color:#854d0e }
        .status-in_progress{ background:#dbeafe;color:#1e40af }
        .status-completed  { background:#dcfce7;color:#14532d }
        .status-overdue    { background:#fee2e2;color:#991b1b }
        .progress-bar-wrap { background:#e5e7eb;border-radius:999px;height:8px;min-width:80px }
        .progress-bar-fill { background:#2563eb;border-radius:999px;height:8px;transition:width .3s }
        @media print {
            .header,.sidebar,.filter-bar,.section-header button { display:none!important }
            .content-area { padding:0!important }
        }
    </style>
</head>
<body>
<div class="app-container">
    <header class="header">
        <div class="logo-section">
            <div class="ca-logo"><img src="../../assets/logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="ca-logo-text" style="display:none">CA</span></div>
            <div class="company-info"><h1 id="firmNameHeader">GStaxOfy</h1><p>GSTaxOfy</p></div>
        </div>
        <div class="user-info" onclick="toggleUserDropdown()">
            <div class="user-avatar" id="headerAvatar">G</div>
            <div class="user-details"><div class="user-name" id="headerUserName">Loading…</div><div class="user-role" id="headerUserRole"></div></div>
            <i class="fas fa-chevron-down" style="color:#6b7280;font-size:12px;margin-left:4px"></i>
            <div class="user-dropdown" id="userDropdown">
                <div class="user-dropdown-item" onclick="window.location.href=ROUTES.changePassword()"><i class="fas fa-key"></i> Change Password</div>
                <div class="user-dropdown-item danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</div>
            </div>
        </div>
    </header>
    <div class="main-content">
        <aside class="sidebar" id="sidebar-placeholder"></aside>
        <main class="content-area">
            <div class="section-header">
                <div class="page-title" style="margin:0"><i class="fas fa-clock"></i> Work Log</div>
                <button class="btn btn-secondary btn-sm" onclick="window.print()"><i class="fas fa-print"></i> Print</button>
            </div>

            <!-- Filters -->
            <div class="filter-bar" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px">
                <select id="filterClient" onchange="applyFilters()" style="padding:7px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;background:#fff;min-width:180px">
                    <option value="">All Clients</option>
                </select>
                <select id="filterStatus" onchange="applyFilters()" style="padding:7px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;background:#fff">
                    <option value="">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="in_progress">In Progress</option>
                    <option value="completed">Completed</option>
                    <option value="overdue">Overdue</option>
                </select>
                <select id="filterMonth" onchange="applyFilters()" style="padding:7px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;background:#fff">
                    <option value="">All Months (Due)</option>
                    <option value="1">January</option><option value="2">February</option><option value="3">March</option>
                    <option value="4">April</option><option value="5">May</option><option value="6">June</option>
                    <option value="7">July</option><option value="8">August</option><option value="9">September</option>
                    <option value="10">October</option><option value="11">November</option><option value="12">December</option>
                </select>
                <select id="groupBy" onchange="applyFilters()" style="padding:7px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;background:#fff">
                    <option value="none">No Grouping</option>
                    <option value="client">Group by Client</option>
                    <option value="service">Group by Service</option>
                </select>
                <button class="btn btn-secondary btn-sm" onclick="clearFilters()"><i class="fas fa-times"></i> Clear</button>
            </div>

            <!-- Summary cards -->
            <div id="wlStats" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px"></div>

            <!-- Table -->
            <div id="wlContent">
                <div style="text-align:center;padding:40px;color:#9ca3af"><i class="fas fa-spinner fa-spin"></i> Loading…</div>
            </div>
        </main>
    </div>
</div>
<div class="modal-overlay" id="logoutModal">
    <div class="modal-box" style="max-width:340px">
        <div class="modal-header"><span class="modal-title">Confirm Logout</span><button class="modal-close" onclick="closeModal('logoutModal')">&times;</button></div>
        <p style="color:#6b7280;margin-bottom:20px;text-align:center">Are you sure you want to logout?</p>
        <div style="display:flex;gap:10px;justify-content:center">
            <button class="btn btn-secondary" onclick="closeModal('logoutModal')">Cancel</button>
            <button class="btn btn-danger" onclick="confirmLogout()">Yes, Logout</button>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../js/supabase-config.js"></script>
<script src="../../js/app.js"></script>
<script src="../../js/sidebar.js"></script>
<script src="../../js/layout.js"></script>
<script>
let allTasks = [];

(async () => {
    const profile = await initLayout();
    if (!profile) return;
    renderSidebar('work-log');
    setActiveNav();

    const [{ data: firm }, { data: tasks }] = await Promise.all([
        _supabase.from('firm_details').select('firm_name').single(),
        _supabase.from('tasks').select('*, clients(name), services(name,description)').order('due_date', { ascending: true })
    ]);
    if (firm) document.getElementById('firmNameHeader').textContent = firm.firm_name;

    const today = new Date(); today.setHours(0,0,0,0);
    allTasks = (tasks||[]).map(t => ({
        ...t,
        _overdue: t.status !== 'completed' && t.due_date && new Date(t.due_date) < today
    }));

    // Populate client filter
    const names = [...new Set(allTasks.map(t => t.clients?.name).filter(Boolean))].sort();
    const sel = document.getElementById('filterClient');
    names.forEach(n => sel.innerHTML += `<option value="${n}">${n}</option>`);

    applyFilters();
})();

function clearFilters() {
    ['filterClient','filterStatus','filterMonth','groupBy'].forEach(id => {
        const el = document.getElementById(id);
        el.value = id === 'groupBy' ? 'none' : '';
    });
    applyFilters();
}

function applyFilters() {
    const cl  = document.getElementById('filterClient').value;
    const st  = document.getElementById('filterStatus').value;
    const mo  = document.getElementById('filterMonth').value;
    const grp = document.getElementById('groupBy').value;

    const filtered = allTasks.filter(t => {
        const effSt = t._overdue ? 'overdue' : t.status;
        if (cl && t.clients?.name !== cl) return false;
        if (st && effSt !== st) return false;
        if (mo && t.due_date && String(new Date(t.due_date).getMonth()+1) !== mo) return false;
        return true;
    });

    renderStats(filtered);
    if (grp === 'client')  renderGrouped(filtered, t => t.clients?.name || 'Unknown');
    else if (grp === 'service') renderGrouped(filtered, t => t.services?.name || t.task_label || 'Unknown');
    else renderTable(filtered);
}

function renderStats(tasks) {
    const counts = { pending:0, in_progress:0, completed:0, overdue:0 };
    tasks.forEach(t => { const k = t._overdue?'overdue':t.status; if(counts[k]!==undefined) counts[k]++; });
    const total = tasks.length;
    const pct   = total ? Math.round((counts.completed/total)*100) : 0;
    document.getElementById('wlStats').innerHTML = `
        <div style="background:#fef9c3;border-radius:8px;padding:8px 16px;display:flex;align-items:center;gap:8px"><span style="font-size:18px;font-weight:700;color:#854d0e">${counts.pending}</span><span style="font-size:12px;color:#854d0e;font-weight:600">Pending</span></div>
        <div style="background:#dbeafe;border-radius:8px;padding:8px 16px;display:flex;align-items:center;gap:8px"><span style="font-size:18px;font-weight:700;color:#1e40af">${counts.in_progress}</span><span style="font-size:12px;color:#1e40af;font-weight:600">In Progress</span></div>
        <div style="background:#dcfce7;border-radius:8px;padding:8px 16px;display:flex;align-items:center;gap:8px"><span style="font-size:18px;font-weight:700;color:#14532d">${counts.completed}</span><span style="font-size:12px;color:#14532d;font-weight:600">Completed</span></div>
        <div style="background:#fee2e2;border-radius:8px;padding:8px 16px;display:flex;align-items:center;gap:8px"><span style="font-size:18px;font-weight:700;color:#991b1b">${counts.overdue}</span><span style="font-size:12px;color:#991b1b;font-weight:600">Overdue</span></div>
        <div style="background:#f3f4f6;border-radius:8px;padding:8px 16px;display:flex;align-items:center;gap:10px">
            <div>
                <div style="font-size:11px;color:#6b7280;font-weight:600">Completion</div>
                <div style="font-size:18px;font-weight:700;color:#2563eb">${pct}%</div>
            </div>
            <div class="progress-bar-wrap" style="width:80px"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        </div>`;
}

function taskRow(t, i) {
    const effSt = t._overdue ? 'overdue' : t.status;
    const stLabels = { pending:'Pending', in_progress:'In Progress', completed:'Completed', overdue:'Overdue' };
    const svcLabel = t.services ? `${t.services.name}${t.services.description?' — '+t.services.description:''}` : (t.task_label||'—');
    return `<tr style="${t._overdue?'background:#fff5f5':''}">
        <td>${i+1}</td>
        <td><strong>${t.clients?.name||'—'}</strong></td>
        <td style="font-size:12px">${svcLabel}</td>
        <td style="font-size:12px;color:#6b7280">${t.period_label||'—'}</td>
        <td style="font-size:12px;white-space:nowrap">${fmtDate(t.due_date)}</td>
        <td><span class="status-badge status-${effSt}">${stLabels[effSt]}</span></td>
        <td style="font-size:12px;color:#6b7280;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.notes||'—'}</td>
    </tr>`;
}

function tableHead() {
    return `<div class="table-wrapper"><table>
        <thead><tr><th>#</th><th>Client</th><th>Service</th><th>Period</th><th>Due Date</th><th>Status</th><th>Notes</th></tr></thead>
        <tbody>`;
}

function renderTable(tasks) {
    if (!tasks.length) { document.getElementById('wlContent').innerHTML = '<div style="text-align:center;padding:40px;color:#9ca3af">No tasks match the current filters.</div>'; return; }
    document.getElementById('wlContent').innerHTML = tableHead() + tasks.map(taskRow).join('') + '</tbody></table></div>';
}

function renderGrouped(tasks, keyFn) {
    if (!tasks.length) { document.getElementById('wlContent').innerHTML = '<div style="text-align:center;padding:40px;color:#9ca3af">No tasks match the current filters.</div>'; return; }
    const groups = {};
    tasks.forEach(t => { const k = keyFn(t); if (!groups[k]) groups[k]=[]; groups[k].push(t); });
    let html = '';
    Object.keys(groups).sort().forEach(grpName => {
        const gtasks = groups[grpName];
        const done   = gtasks.filter(t=>t.status==='completed').length;
        html += `<div style="margin-bottom:20px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
                <h4 style="margin:0;font-size:14px;font-weight:700;color:#1f2937">${grpName}</h4>
                <span style="font-size:12px;color:#6b7280">${done}/${gtasks.length} completed</span>
            </div>
            ${tableHead()}${gtasks.map((t,i)=>taskRow(t,i+1)).join('')}</tbody></table></div>
        </div>`;
    });
    document.getElementById('wlContent').innerHTML = html;
}
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('../../sw.js').catch(()=>{})}</script>
</body>
</html>
