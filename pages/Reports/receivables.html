<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GStaxOfy — Receivables</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="manifest" href="../../manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="GStaxOfy">
    <link rel="apple-touch-icon" href="../../assets/icon-192.png">
    <style>
        .stat-card { background:#fff;border:1.5px solid #e5e7eb;border-radius:10px;padding:16px 20px;display:flex;flex-direction:column;gap:4px }
        .stat-num  { font-size:24px;font-weight:800 }
        .stat-lbl  { font-size:12px;color:#6b7280;font-weight:500 }
        .overdue-row { background:#fff5f5 }
    </style>
</head>
<body>
<div class="app-container">
    <header class="header">
        <div class="logo-section">
            <div class="ca-logo"><img src="../../assets/logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="ca-logo-text" style="display:none">CA</span></div>
            <div class="company-info"><h1 id="firmNameHeader">GStaxOfy</h1><p>GSTaxOfy</p></div>
        </div>
        <div class="user-info" onclick="toggleUserDropdown()">
            <div class="user-avatar" id="headerAvatar">G</div>
            <div class="user-details"><div class="user-name" id="headerUserName">Loading…</div><div class="user-role" id="headerUserRole"></div></div>
            <i class="fas fa-chevron-down" style="color:#6b7280;font-size:12px;margin-left:4px"></i>
            <div class="user-dropdown" id="userDropdown">
                <div class="user-dropdown-item" onclick="window.location.href=ROUTES.changePassword()"><i class="fas fa-key"></i> Change Password</div>
                <div class="user-dropdown-item danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</div>
            </div>
        </div>
    </header>
    <div class="main-content">
        <aside class="sidebar" id="sidebar-placeholder"></aside>
        <main class="content-area">
            <div class="section-header">
                <div class="page-title" style="margin:0"><i class="fas fa-money-bill-wave"></i> Receivables</div>
                <button class="btn btn-secondary btn-sm" onclick="window.print()"><i class="fas fa-print"></i> Print</button>
            </div>

            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px" id="statsRow"></div>

            <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px">
                <input type="text" id="searchInput" placeholder="Search client…" oninput="filterTable()"
                    style="padding:7px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;min-width:180px">
                <select id="filterAge" onchange="filterTable()" style="padding:7px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;background:#fff">
                    <option value="">All</option>
                    <option value="current">Current (not overdue)</option>
                    <option value="0-30">Overdue 0–30 days</option>
                    <option value="31-60">Overdue 31–60 days</option>
                    <option value="60+">Overdue 60+ days</option>
                </select>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>#</th><th>Client</th><th>Invoice No.</th><th>Invoice Date</th><th>Amount</th><th>Collected</th><th>Balance</th><th>Overdue (days)</th></tr>
                    </thead>
                    <tbody id="recvBody">
                        <tr><td colspan="8" style="text-align:center;padding:30px;color:#9ca3af"><i class="fas fa-spinner fa-spin"></i> Loading…</td></tr>
                    </tbody>
                </table>
            </div>
            <div id="recvFooter" style="text-align:right;padding:10px 4px;font-size:13px;color:#6b7280"></div>
        </main>
    </div>
</div>
<div class="modal-overlay" id="logoutModal">
    <div class="modal-box" style="max-width:340px">
        <div class="modal-header"><span class="modal-title">Confirm Logout</span><button class="modal-close" onclick="closeModal('logoutModal')">&times;</button></div>
        <p style="color:#6b7280;margin-bottom:20px;text-align:center">Are you sure you want to logout?</p>
        <div style="display:flex;gap:10px;justify-content:center">
            <button class="btn btn-secondary" onclick="closeModal('logoutModal')">Cancel</button>
            <button class="btn btn-danger" onclick="confirmLogout()">Yes, Logout</button>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../js/supabase-config.js"></script>
<script src="../../js/app.js"></script>
<script src="../../js/sidebar.js"></script>
<script src="../../js/layout.js"></script>
<script>
let rows = [];

(async () => {
    const profile = await initLayout();
    if (!profile) return;
    renderSidebar('receivables');
    setActiveNav();
    const { data: firm } = await _supabase.from('firm_details').select('firm_name').single();
    if (firm) document.getElementById('firmNameHeader').textContent = firm.firm_name;

    // Load invoices + receipts in parallel
    const [{ data: invoices }, { data: receipts }] = await Promise.all([
        _supabase.from('invoices').select('id,invoice_no,invoice_date,total_amount,status,clients(name)').in('status',['unpaid','paid']).order('invoice_date', { ascending: false }),
        _supabase.from('receipts').select('invoice_id,amount,is_cancelled')
    ]);

    // Group receipts by invoice — cancelled receipts no longer count toward "collected"
    const collected = {};
    (receipts||[]).forEach(r => { if (r.invoice_id && !r.is_cancelled) collected[r.invoice_id] = (collected[r.invoice_id]||0) + parseFloat(r.amount||0); });

    const today = new Date(); today.setHours(0,0,0,0);
    rows = (invoices||[]).map(inv => {
        const invAmt  = parseFloat(inv.total_amount||0);
        const col     = collected[inv.id] || 0;
        const balance = Math.max(0, invAmt - col);
        const invDate = inv.invoice_date ? new Date(inv.invoice_date) : null;
        const overdue = invDate ? Math.max(0, Math.floor((today - invDate)/(1000*60*60*24))) : 0;
        return { ...inv, collected: col, balance, overdueDays: balance > 0 ? overdue : 0 };
    });

    renderStats();
    filterTable();
})();

function renderStats() {
    const totalInv  = rows.reduce((s,r)=>s+parseFloat(r.total_amount||0),0);
    const totalCol  = rows.reduce((s,r)=>s+r.collected,0);
    const totalBal  = rows.reduce((s,r)=>s+r.balance,0);
    const overdue   = rows.filter(r=>r.balance>0&&r.overdueDays>0).length;
    document.getElementById('statsRow').innerHTML = [
        { label:'Total Billed',    num:'₹'+fmt(totalInv), color:'#2563eb', bg:'#dbeafe' },
        { label:'Collected',       num:'₹'+fmt(totalCol), color:'#059669', bg:'#dcfce7' },
        { label:'Outstanding',     num:'₹'+fmt(totalBal), color:'#dc2626', bg:'#fee2e2' },
        { label:'Overdue Invoices',num:overdue,            color:'#d97706', bg:'#fef3c7' },
    ].map(s=>`<div class="stat-card" style="border-color:${s.bg}">
        <div class="stat-num" style="color:${s.color}">${s.num}</div>
        <div class="stat-lbl">${s.label}</div>
    </div>`).join('');
}

function fmt(n) { return parseFloat(n).toLocaleString('en-IN',{minimumFractionDigits:2}); }

function filterTable() {
    const q   = document.getElementById('searchInput').value.toLowerCase();
    const age = document.getElementById('filterAge').value;
    const filtered = rows.filter(r => {
        if (q && !(r.clients?.name||'').toLowerCase().includes(q)) return false;
        if (age === 'current'  && r.overdueDays > 0) return false;
        if (age === '0-30'     && (r.overdueDays === 0 || r.overdueDays > 30)) return false;
        if (age === '31-60'    && (r.overdueDays < 31 || r.overdueDays > 60)) return false;
        if (age === '60+'      && r.overdueDays <= 60) return false;
        return true;
    });
    const body = document.getElementById('recvBody');
    if (!filtered.length) { body.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:30px;color:#9ca3af">No records found.</td></tr>'; document.getElementById('recvFooter').textContent=''; return; }
    body.innerHTML = filtered.map((r,i)=>`<tr class="${r.overdueDays>0&&r.balance>0?'overdue-row':''}">
        <td>${i+1}</td>
        <td><strong>${r.clients?.name||'—'}</strong></td>
        <td><code style="background:#f3f4f6;padding:2px 6px;border-radius:4px;font-size:12px">${r.invoice_no||'—'}</code></td>
        <td style="font-size:12px">${fmtDate(r.invoice_date)}</td>
        <td>₹ ${fmt(r.total_amount)}</td>
        <td style="color:#059669">₹ ${fmt(r.collected)}</td>
        <td><strong style="color:${r.balance>0?'#dc2626':'#059669'}">₹ ${fmt(r.balance)}</strong></td>
        <td>${r.balance<=0?'<span class="badge badge-green">Paid</span>':r.overdueDays===0?'<span class="badge badge-blue">Current</span>':`<span class="badge badge-red">${r.overdueDays}d overdue</span>`}</td>
    </tr>`).join('');
    const totalBal = filtered.reduce((s,r)=>s+r.balance,0);
    document.getElementById('recvFooter').innerHTML = `<strong>Outstanding: <span style="color:#dc2626">₹${fmt(totalBal)}</span></strong>`;
}
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('../../sw.js').catch(()=>{})}</script>
</body>
</html>
