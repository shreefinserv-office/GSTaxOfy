<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GStaxOfy — Account Ledger</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="manifest" href="../../manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="GStaxOfy">
    <link rel="apple-touch-icon" href="../../assets/icon-192.png">
    <style>
        .ledger-dr { color:#dc2626;font-weight:600 }
        .ledger-cr { color:#059669;font-weight:600 }
        .ledger-bal-pos { color:#059669;font-weight:700 }
        .ledger-bal-neg { color:#dc2626;font-weight:700 }
        @media print {
            .header,.sidebar,.section-header button,.filter-bar { display:none!important }
            .content-area { padding:0!important }
        }
    </style>
</head>
<body>
<div class="app-container">
    <header class="header">
        <div class="logo-section">
            <div class="ca-logo"><img src="../../assets/logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="ca-logo-text" style="display:none">CA</span></div>
            <div class="company-info"><h1 id="firmNameHeader">GStaxOfy</h1><p>GSTaxOfy</p></div>
        </div>
        <div class="user-info" onclick="toggleUserDropdown()">
            <div class="user-avatar" id="headerAvatar">G</div>
            <div class="user-details"><div class="user-name" id="headerUserName">Loading…</div><div class="user-role" id="headerUserRole"></div></div>
            <i class="fas fa-chevron-down" style="color:#6b7280;font-size:12px;margin-left:4px"></i>
            <div class="user-dropdown" id="userDropdown">
                <div class="user-dropdown-item" onclick="window.location.href=ROUTES.changePassword()"><i class="fas fa-key"></i> Change Password</div>
                <div class="user-dropdown-item danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</div>
            </div>
        </div>
    </header>
    <div class="main-content">
        <aside class="sidebar" id="sidebar-placeholder"></aside>
        <main class="content-area">
            <div class="section-header">
                <div class="page-title" style="margin:0"><i class="fas fa-book"></i> Account Ledger</div>
                <button class="btn btn-secondary btn-sm" onclick="window.print()"><i class="fas fa-print"></i> Print</button>
            </div>

            <div class="filter-bar" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px">
                <select id="filterClient" onchange="loadLedger()" style="padding:7px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;background:#fff;min-width:200px">
                    <option value="">— Select Client —</option>
                </select>
                <input type="date" id="filterFrom" onchange="loadLedger()" style="padding:7px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px">
                <input type="date" id="filterTo" onchange="loadLedger()" style="padding:7px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px">
                <button class="btn btn-secondary btn-sm" onclick="clearFilters()"><i class="fas fa-times"></i> Clear</button>
            </div>

            <div id="ledgerSummary" style="display:none;background:#f8fafc;border:1.5px solid #e5e7eb;border-radius:10px;padding:16px;margin-bottom:16px;display:flex;gap:20px;flex-wrap:wrap"></div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>Date</th><th>Type</th><th>Reference</th><th>Description</th><th class="ledger-dr">Debit (Invoice)</th><th class="ledger-cr">Credit (Receipt)</th><th>Running Balance</th></tr>
                    </thead>
                    <tbody id="ledgerBody">
                        <tr><td colspan="7" style="text-align:center;padding:40px;color:#9ca3af">Select a client to view their ledger.</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</div>
<div class="modal-overlay" id="logoutModal">
    <div class="modal-box" style="max-width:340px">
        <div class="modal-header"><span class="modal-title">Confirm Logout</span><button class="modal-close" onclick="closeModal('logoutModal')">&times;</button></div>
        <p style="color:#6b7280;margin-bottom:20px;text-align:center">Are you sure you want to logout?</p>
        <div style="display:flex;gap:10px;justify-content:center">
            <button class="btn btn-secondary" onclick="closeModal('logoutModal')">Cancel</button>
            <button class="btn btn-danger" onclick="confirmLogout()">Yes, Logout</button>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../js/supabase-config.js"></script>
<script src="../../js/app.js"></script>
<script src="../../js/sidebar.js"></script>
<script src="../../js/layout.js"></script>
<script>
(async () => {
    const profile = await initLayout();
    if (!profile) return;
    renderSidebar('account-ledger');
    setActiveNav();
    const [{ data: firm }, { data: clients }] = await Promise.all([
        _supabase.from('firm_details').select('firm_name').single(),
        _supabase.from('clients').select('id,name').eq('is_active',true).order('name')
    ]);
    if (firm) document.getElementById('firmNameHeader').textContent = firm.firm_name;
    const sel = document.getElementById('filterClient');
    (clients||[]).forEach(c => sel.innerHTML += `<option value="${c.id}">${c.name}</option>`);
})();

function clearFilters() {
    document.getElementById('filterFrom').value = '';
    document.getElementById('filterTo').value   = '';
    loadLedger();
}

async function loadLedger() {
    const cid  = parseInt(document.getElementById('filterClient').value);
    const from = document.getElementById('filterFrom').value;
    const to   = document.getElementById('filterTo').value;
    const body = document.getElementById('ledgerBody');

    if (!cid) { body.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#9ca3af">Select a client to view their ledger.</td></tr>'; document.getElementById('ledgerSummary').style.display='none'; return; }
    body.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:20px;color:#9ca3af"><i class="fas fa-spinner fa-spin"></i> Loading…</td></tr>';

    let invQ = _supabase.from('invoices').select('id,invoice_no,invoice_date,total_amount,status').eq('client_id', cid);
    let rcpQ = _supabase.from('receipts').select('receipt_no,receipt_date,amount,payment_mode,invoice_id').eq('client_id', cid);
    if (from) { invQ = invQ.gte('invoice_date', from); rcpQ = rcpQ.gte('receipt_date', from); }
    if (to)   { invQ = invQ.lte('invoice_date', to);   rcpQ = rcpQ.lte('receipt_date', to); }

    const [{ data: invoices }, { data: receipts }] = await Promise.all([invQ, rcpQ]);

    // Build unified journal
    const entries = [];
    (invoices||[]).forEach(inv => entries.push({ date: inv.invoice_date, type: 'Invoice', ref: inv.invoice_no, desc: 'Invoice raised', debit: parseFloat(inv.total_amount||0), credit: 0 }));
    (receipts||[]).forEach(r   => entries.push({ date: r.receipt_date,   type: 'Receipt', ref: r.receipt_no,   desc: `Payment received (${r.payment_mode})`, debit: 0, credit: parseFloat(r.amount||0) }));
    entries.sort((a,b) => new Date(a.date) - new Date(b.date));

    let running = 0, totalDr = 0, totalCr = 0;
    if (!entries.length) { body.innerHTML='<tr><td colspan="7" style="text-align:center;padding:30px;color:#9ca3af">No transactions found.</td></tr>'; document.getElementById('ledgerSummary').style.display='none'; return; }

    body.innerHTML = entries.map((e,i) => {
        running += e.debit - e.credit;
        totalDr += e.debit; totalCr += e.credit;
        return `<tr>
            <td style="font-size:12px;white-space:nowrap">${fmtDate(e.date)}</td>
            <td><span class="badge ${e.type==='Invoice'?'badge-red':'badge-green'}" style="font-size:11px">${e.type}</span></td>
            <td><code style="background:#f3f4f6;padding:2px 6px;border-radius:4px;font-size:12px">${e.ref||'—'}</code></td>
            <td style="font-size:12px">${e.desc}</td>
            <td class="ledger-dr">${e.debit>0?'₹ '+fmt(e.debit):'—'}</td>
            <td class="ledger-cr">${e.credit>0?'₹ '+fmt(e.credit):'—'}</td>
            <td class="${running>0?'ledger-bal-neg':'ledger-bal-pos'}">₹ ${fmt(Math.abs(running))} ${running>0?'Dr':'Cr'}</td>
        </tr>`;
    }).join('') + `<tr style="background:#f8fafc;font-weight:700">
        <td colspan="4" style="text-align:right;font-size:13px">Totals</td>
        <td class="ledger-dr">₹ ${fmt(totalDr)}</td>
        <td class="ledger-cr">₹ ${fmt(totalCr)}</td>
        <td class="${running>0?'ledger-bal-neg':'ledger-bal-pos'}">₹ ${fmt(Math.abs(running))} ${running>0?'Dr':'Cr'}</td>
    </tr>`;

    document.getElementById('ledgerSummary').style.display = 'flex';
    document.getElementById('ledgerSummary').innerHTML = [
        { label:'Total Invoiced', val:'₹'+fmt(totalDr), color:'#dc2626' },
        { label:'Total Received', val:'₹'+fmt(totalCr), color:'#059669' },
        { label:'Net Balance',    val:'₹'+fmt(Math.abs(running))+' '+(running>0?'Due':'Advance'), color: running>0?'#dc2626':'#059669' },
    ].map(s=>`<div><div style="font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px">${s.label}</div><div style="font-size:18px;font-weight:700;color:${s.color}">${s.val}</div></div>`).join('');
}

function fmt(n) { return parseFloat(n).toLocaleString('en-IN',{minimumFractionDigits:2}); }
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('../../sw.js').catch(()=>{})}</script>
</body>
</html>
