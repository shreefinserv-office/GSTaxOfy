<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GStaxOfy — Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            min-height:100vh; display:flex; align-items:center;
            justify-content:center; padding:20px; position:relative; overflow:hidden;
        }
        .bg-particles { position:absolute; inset:0; pointer-events:none; z-index:1; }
        .particle {
            position:absolute; background:rgba(255,255,255,.1);
            border-radius:50%; animation:float 6s ease-in-out infinite;
        }
        .particle:nth-child(1){width:80px;height:80px;left:10%;animation-delay:0s;top:20%}
        .particle:nth-child(2){width:60px;height:60px;left:80%;animation-delay:1s;top:60%}
        .particle:nth-child(3){width:100px;height:100px;left:60%;animation-delay:2s;top:10%}
        .particle:nth-child(4){width:40px;height:40px;left:20%;animation-delay:3s;top:70%}
        .particle:nth-child(5){width:120px;height:120px;left:90%;animation-delay:4s;top:30%}
        @keyframes float {
            0%,100%{transform:translateY(0)rotate(0)}
            33%{transform:translateY(-30px)rotate(120deg)}
            66%{transform:translateY(-15px)rotate(240deg)}
        }
        .login-container {
            background:rgba(255,255,255,.15); backdrop-filter:blur(20px);
            border-radius:20px; padding:40px; width:100%; max-width:440px;
            box-shadow:0 25px 50px rgba(0,0,0,.2); border:1px solid rgba(255,255,255,.2);
            position:relative; z-index:10; animation:slideIn .8s ease-out;
        }
        @keyframes slideIn { from{opacity:0;transform:translateY(50px)} to{opacity:1;transform:translateY(0)} }
        .logo-section { text-align:center; margin-bottom:36px; }
        .ca-logo {
            width:90px; height:90px;
            background:linear-gradient(45deg,#2563eb,#7c3aed);
            border-radius:18px; display:inline-flex; align-items:center;
            justify-content:center; position:relative; overflow:hidden;
            box-shadow:0 15px 35px rgba(37,99,235,.4); margin-bottom:18px;
            animation:logoGlow 3s ease-in-out infinite alternate;
        }
        @keyframes logoGlow {
            0%{box-shadow:0 15px 35px rgba(37,99,235,.4);transform:scale(1)}
            100%{box-shadow:0 20px 45px rgba(124,58,237,.6);transform:scale(1.04)}
        }
        .ca-logo::before {
            content:''; position:absolute; inset:0;
            background:linear-gradient(45deg,#2563eb 25%,transparent 25%,transparent 75%,#7c3aed 75%),
                        linear-gradient(45deg,#7c3aed 25%,transparent 25%,transparent 75%,#2563eb 75%);
            background-size:20px 20px; background-position:0 0,10px 10px;
            opacity:.3; animation:patternMove 8s linear infinite;
        }
        @keyframes patternMove {
            0%{background-position:0 0,10px 10px}
            100%{background-position:20px 20px,30px 30px}
        }
        .ca-logo-text { color:#fff; font-size:32px; font-weight:bold; z-index:1; text-shadow:0 2px 8px rgba(0,0,0,.3); }
        .company-info h1 { color:#fff; font-size:28px; font-weight:700; margin-bottom:6px; text-shadow:0 2px 10px rgba(0,0,0,.3); }
        .company-info p  { color:rgba(255,255,255,.85); font-size:15px; font-weight:500; }
        .form-group { margin-bottom:22px; position:relative; }
        .form-group label { display:block; margin-bottom:7px; font-weight:600; color:rgba(255,255,255,.9); font-size:13px; text-transform:uppercase; letter-spacing:.5px; }
        .input-wrapper { position:relative; }
        .form-group input {
            width:100%; padding:14px 48px 14px 18px; border:2px solid rgba(255,255,255,.2);
            border-radius:12px; font-size:15px; background:rgba(255,255,255,.1);
            backdrop-filter:blur(10px); color:#fff; transition:all .3s;
        }
        .form-group input::placeholder { color:rgba(255,255,255,.55); }
        .form-group input:focus { outline:none; border-color:#2563eb; box-shadow:0 0 0 4px rgba(37,99,235,.2); background:rgba(255,255,255,.18); }
        .input-icon { position:absolute; right:16px; top:50%; transform:translateY(-50%); color:rgba(255,255,255,.6); cursor:pointer; font-size:15px; }
        .remember-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
        .remember-label { display:flex; align-items:center; gap:8px; color:rgba(255,255,255,.85); font-size:14px; cursor:pointer; }
        .remember-label input[type=checkbox] { width:16px; height:16px; accent-color:#2563eb; cursor:pointer; }
        .forgot-link { color:rgba(255,255,255,.85); font-size:13px; text-decoration:none; cursor:pointer; transition:color .2s; }
        .forgot-link:hover { color:#fff; text-decoration:underline; }
        .btn-login {
            width:100%; padding:15px; border:none; border-radius:12px; font-size:16px;
            font-weight:700; background:linear-gradient(45deg,#2563eb,#7c3aed);
            color:#fff; cursor:pointer; box-shadow:0 8px 25px rgba(37,99,235,.4);
            transition:all .3s; position:relative; overflow:hidden;
        }
        .btn-login:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 12px 30px rgba(37,99,235,.5); }
        .btn-login:disabled { opacity:.7; cursor:not-allowed; transform:none; }
        .btn-login .btn-loading { display:none; }
        .btn-login.loading .btn-text    { display:none; }
        .btn-login.loading .btn-loading { display:inline-flex; align-items:center; gap:8px; }
        .spinner-sm { width:16px; height:16px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg)} }
        .alert { padding:12px 16px; border-radius:10px; font-size:14px; margin-bottom:16px; display:none; align-items:center; gap:10px; }
        .alert-error   { background:rgba(239,68,68,.15); border:1px solid rgba(239,68,68,.4); color:#fca5a5; }
        .alert-success { background:rgba(16,185,129,.15); border:1px solid rgba(16,185,129,.4); color:#6ee7b7; }
        .alert.show { display:flex; }
        /* Forgot password modal */
        .modal-overlay {
            display:none; position:fixed; inset:0; background:rgba(0,0,0,.6);
            backdrop-filter:blur(6px); z-index:2000; align-items:center; justify-content:center;
        }
        .modal-overlay.show { display:flex; }
        .modal-box {
            background:#fff; border-radius:16px; padding:28px;
            width:90%; max-width:420px;
            box-shadow:0 25px 60px rgba(0,0,0,.3);
            animation:mIn .25s ease-out;
        }
        @keyframes mIn { from{opacity:0;transform:scale(.93)} to{opacity:1;transform:scale(1)} }
        .modal-box h2 { font-size:18px; font-weight:700; color:#1f2937; margin-bottom:6px; }
        .modal-box p  { font-size:13px; color:#6b7280; margin-bottom:18px; }
        .modal-box input {
            width:100%; padding:11px 14px; border:1.5px solid #d1d5db;
            border-radius:8px; font-size:14px; margin-bottom:14px; outline:none;
        }
        .modal-box input:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.1); }
        .modal-actions { display:flex; gap:10px; justify-content:flex-end; }
        .btn-sm { padding:8px 18px; border-radius:8px; border:none; font-size:13px; font-weight:600; cursor:pointer; }
        .btn-primary { background:#2563eb; color:#fff; }
        .btn-cancel  { background:#f3f4f6; color:#374151; }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="GStaxOfy">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
</head>
<body>
    <div class="bg-particles">
        <div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    </div>

    <div class="login-container">
        <div class="logo-section">
            <div class="ca-logo"><img src="assets/logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="ca-logo-text" style="display:none">CA</span></div>
            <div class="company-info">
                <h1>GStaxOfy</h1>
                <p>GSTaxOfy</p>
            </div>
        </div>

        <div class="alert alert-error" id="alertError"><i class="fas fa-exclamation-circle"></i><span id="alertErrorMsg"></span></div>
        <div class="alert alert-success" id="alertSuccess"><i class="fas fa-check-circle"></i><span id="alertSuccessMsg"></span></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email / Username</label>
                <div class="input-wrapper">
                    <input type="text" id="loginEmail" placeholder="Enter your email" autocomplete="username" required>
                    <i class="fas fa-user input-icon"></i>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password" required>
                    <i class="fas fa-eye input-icon" id="togglePwd" onclick="togglePassword()"></i>
                </div>
            </div>
            <div class="remember-row">
                <label class="remember-label">
                    <input type="checkbox" id="rememberMe"> Remember me
                </label>
                <a class="forgot-link" onclick="openForgotModal()">Forgot Password?</a>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">
                <span class="btn-text"><i class="fas fa-sign-in-alt"></i> &nbsp;Login</span>
                <span class="btn-loading"><div class="spinner-sm"></div> Signing in…</span>
            </button>
        </form>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal-overlay" id="forgotModal">
        <div class="modal-box">
            <h2><i class="fas fa-key" style="color:#2563eb;margin-right:8px"></i>Reset Password</h2>
            <p>Enter your registered email. We'll send a password reset link.</p>
            <input type="email" id="forgotEmail" placeholder="your@email.com">
            <div class="alert alert-error" id="forgotAlert" style="margin-bottom:12px"></div>
            <div class="modal-actions">
                <button class="btn-sm btn-cancel" onclick="closeForgotModal()">Cancel</button>
                <button class="btn-sm btn-primary" id="forgotBtn" onclick="sendResetEmail()">Send Link</button>
            </div>
        </div>
    </div>

    <!-- Supabase JS v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script>
        // If already logged in, redirect
        (async () => {
            const { data:{ session } } = await _supabase.auth.getSession();
            if (session) window.location.href = ROUTES.dashboard();
        })();

        // Remember me
        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('gst_remember_email');
            if (saved) {
                document.getElementById('loginEmail').value = saved;
                document.getElementById('rememberMe').checked = true;
            }
        });

        function showError(msg)   { const el=document.getElementById('alertError');   document.getElementById('alertErrorMsg').textContent=msg;   el.classList.add('show'); document.getElementById('alertSuccess').classList.remove('show'); }
        function showSuccess(msg) { const el=document.getElementById('alertSuccess'); document.getElementById('alertSuccessMsg').textContent=msg; el.classList.add('show'); document.getElementById('alertError').classList.remove('show'); }
        function clearAlerts()    { document.getElementById('alertError').classList.remove('show'); document.getElementById('alertSuccess').classList.remove('show'); }

        function togglePassword() {
            const pwd  = document.getElementById('loginPassword');
            const icon = document.getElementById('togglePwd');
            if (pwd.type === 'password') { pwd.type='text'; icon.className='fas fa-eye-slash input-icon'; }
            else                         { pwd.type='password'; icon.className='fas fa-eye input-icon'; }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearAlerts();
            const emailInput = document.getElementById('loginEmail').value.trim();
            const password   = document.getElementById('loginPassword').value;
            const btn        = document.getElementById('loginBtn');

            if (!emailInput || !password) { showError('Please fill in all fields.'); return; }

            btn.classList.add('loading');
            btn.disabled = true;

            try {
                // Support login by username: look up email from user_profiles
                let email = emailInput;
                if (!emailInput.includes('@')) {
                    // Treat as username — fetch email from profiles via service
                    // We use a public-safe query: username is public info
                    const { data: prof, error: pe } = await _supabase
                        .from('user_profiles')
                        .select('id')
                        .eq('username', emailInput)
                        .eq('is_active', true)
                        .single();
                    if (pe || !prof) { showError('Invalid username or password.'); return; }
                    // Get the auth user email via admin — we store email in auth.users
                    // For username login, we fallback: ask user to use email
                    showError('Please use your registered email to log in.');
                    return;
                }

                const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
                if (error) { showError(error.message || 'Invalid credentials.'); return; }

                // Check profile is active
                const { data: profile } = await _supabase
                    .from('user_profiles')
                    .select('is_active, full_name')
                    .eq('id', data.user.id)
                    .single();

                if (!profile || !profile.is_active) {
                    await _supabase.auth.signOut();
                    showError('Your account is inactive. Contact the administrator.');
                    return;
                }

                // Remember me
                if (document.getElementById('rememberMe').checked) {
                    localStorage.setItem('gst_remember_email', email);
                } else {
                    localStorage.removeItem('gst_remember_email');
                }

                showSuccess(`Welcome back, ${profile.full_name}! Redirecting…`);
                setTimeout(() => window.location.href = ROUTES.dashboard(), 1200);

            } catch (err) {
                showError('Unexpected error. Please try again.');
                console.error(err);
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });

        // Forgot password
        function openForgotModal()  { document.getElementById('forgotModal').classList.add('show'); document.getElementById('forgotEmail').focus(); }
        function closeForgotModal() { document.getElementById('forgotModal').classList.remove('show'); }

        async function sendResetEmail() {
            const email = document.getElementById('forgotEmail').value.trim();
            const alertEl = document.getElementById('forgotAlert');
            const btn = document.getElementById('forgotBtn');
            alertEl.style.display = 'none';
            if (!email) { alertEl.style.display='flex'; alertEl.textContent='Please enter your email.'; return; }
            btn.disabled = true; btn.textContent = 'Sending…';
            const { error } = await _supabase.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + BASE + '/pages/change-password.html'
            });
            btn.disabled = false; btn.textContent = 'Send Link';
            if (error) { alertEl.style.display='flex'; alertEl.className='alert alert-error'; alertEl.textContent=error.message; }
            else {
                closeForgotModal();
                showSuccess('Password reset link sent! Check your email.');
            }
        }

        // Close forgot modal on overlay click
        document.getElementById('forgotModal').addEventListener('click', e => {
            if (e.target === document.getElementById('forgotModal')) closeForgotModal();
        });
    </script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').then(()=>console.log('[PWA] SW registered')).catch(e=>console.warn('[PWA] SW failed:',e));}</script>
</body>
</html>
